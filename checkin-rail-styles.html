<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D12">
<title>OBEY OS · Daily Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0D12;--white:#F9FAFB;--muted:#8A93A6;--mid:#747E8C;--dim:#5C6679;--hair:rgba(255,255,255,.08);
  --lime:#C8FF00;--mint:#00E5A0;--amber:#F59E0B;--red:#EF4444;
  --glass:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.018));
  --head:'Bebas Neue',sans-serif;--body:'Inter',sans-serif;--mono:'DM Mono',monospace;--ease:cubic-bezier(.23,1,.32,1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;height:100%;}
body{font-family:var(--body);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
.screen{position:relative;width:100%;max-width:430px;height:100dvh;min-height:800px;overflow:hidden;
  background:var(--bg);background-image:radial-gradient(rgba(200,255,0,.024) 1px,transparent 1px);background-size:28px 28px;}
.screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;background:radial-gradient(120% 50% at 50% 0%,rgba(200,255,0,.045),transparent 55%);}

.hd{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:baseline;justify-content:space-between;padding:20px 22px 0;}
.hd .k{font-family:var(--mono);font-size:9px;letter-spacing:.28em;color:var(--lime);text-transform:uppercase;}
.hd .d{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--dim);text-transform:uppercase;}
.sub{position:absolute;top:44px;left:0;right:0;z-index:20;text-align:center;font-family:var(--mono);font-size:8px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;}
.stage{position:absolute;top:70px;bottom:9.5%;left:0;right:0;z-index:5;padding:0 24px;overflow-y:auto;}
.tabs{position:absolute;left:14px;right:14px;bottom:2.6%;z-index:20;display:flex;gap:5px;}
.tab{flex:1;background:none;border:1px solid var(--hair);border-radius:9px;padding:8px 2px 7px;cursor:pointer;text-align:center;transition:all .25s;}
.tab .tn{font-family:var(--head);font-size:13px;letter-spacing:.04em;color:var(--dim);line-height:1;transition:color .25s;}
.tab .tk{font-family:var(--mono);font-size:5.8px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;margin-top:3px;opacity:.7;}
.tab.on{border-color:color-mix(in srgb,var(--lime) 45%,transparent);background:color-mix(in srgb,var(--lime) 5%,transparent);}
.tab.on .tn{color:var(--lime);}

/* rows (LOCKED from founder picks — M3 grade, labeled stops, smooth drag) */
.row{padding:13px 0 4px;border-top:1px solid var(--hair);}
.row:first-child{border-top:none;}
.rtop{display:flex;align-items:center;gap:12px;}
.ring{position:relative;width:50px;height:50px;flex-shrink:0;border-radius:50%;border:1px solid var(--hair);background:var(--glass);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:border-color .3s,box-shadow .3s;}
.ring img{width:38px;height:38px;object-fit:contain;mix-blend-mode:screen;
  -webkit-mask:radial-gradient(72% 76% at 50% 50%,#000 58%,transparent 92%);mask:radial-gradient(72% 76% at 50% 50%,#000 58%,transparent 92%);
  animation:icoFloat 5.4s ease-in-out infinite;}
@keyframes icoFloat{0%,100%{transform:translateY(-1.5px) rotate(-2deg)}50%{transform:translateY(2px) rotate(2deg)}}
.ring.lit{border-color:color-mix(in srgb,var(--rc) 55%,transparent);box-shadow:0 0 14px color-mix(in srgb,var(--rc) 30%,transparent);}
.rmid{flex:1;min-width:0;}
.rnm{font-family:var(--head);font-size:19px;letter-spacing:.03em;}
.rq{font-family:var(--body);font-weight:300;font-size:10.5px;color:var(--mid);margin-top:1px;}
/* per-category readout: level word + ITS OWN SCORE */
.rend{text-align:right;min-width:62px;}
.rword{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--rc,var(--dim));text-transform:uppercase;transition:color .3s;}
.rsc{font-family:var(--head);font-size:21px;line-height:1;color:var(--rc,var(--dim));margin-top:2px;text-shadow:0 0 12px color-mix(in srgb,var(--rc,transparent) 30%,transparent);}

.sl{position:relative;height:58px;margin-top:2px;touch-action:none;cursor:pointer;}
.sl .trk{position:absolute;left:13px;right:13px;top:22px;height:1.5px;background:rgba(255,255,255,.13);border-radius:1px;}
.sl .fill{position:absolute;left:13px;top:22px;height:1.5px;width:0;background:var(--rc,transparent);box-shadow:0 0 8px color-mix(in srgb,var(--rc,transparent) 60%,transparent);}
.sl .stop{position:absolute;top:22px;width:1.5px;height:7px;transform:translate(-50%,-50%);background:rgba(255,255,255,.22);}
.sl .lb{position:absolute;top:37px;transform:translateX(-50%);font-family:var(--mono);font-size:7px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;transition:color .25s;white-space:nowrap;}
.sl .lb:first-of-type{transform:none;}
.sl .lb.last{transform:translateX(-100%);}
.sl .lb.on{color:var(--rc);}
.sl .th{position:absolute;top:22px;left:13px;width:25px;height:25px;transform:translate(-50%,-50%);border-radius:50%;
  background:#0A0D12;border:2px solid var(--rc,rgba(255,255,255,.22));box-shadow:0 0 10px color-mix(in srgb,var(--rc,transparent) 45%,transparent);
  display:flex;align-items:center;justify-content:center;z-index:2;}
.sl .th svg{width:12px;height:12px;opacity:.45;transition:opacity .25s;filter:drop-shadow(0 0 5px rgba(200,255,0,.5));}
.sl.set .th svg{opacity:1;}
.sl.settle .th,.sl.settle .fill{transition:left .28s var(--ease),width .28s var(--ease);}

/* ══ the SCORE + CTA zone — 5 style variants ══ */
#szone{margin-top:10px;}
.skip{display:block;width:100%;background:none;border:none;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;cursor:pointer;padding:11px 0 4px;text-align:center;}
.skipped{display:none;text-align:center;padding-top:7vh;}
.skipped.show{display:block;}
.skipped .b{width:52px;height:52px;margin:0 auto 14px;filter:drop-shadow(0 0 10px rgba(200,255,0,.5));}
.skipped .b svg{width:100%;height:100%;}
.skipped h3{font-family:var(--head);font-size:30px;letter-spacing:.03em;}
.skipped p{font-family:var(--body);font-weight:300;font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5;}
.skipped .m{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-top:14px;}

/* CTA family */
.cta-pill{display:block;width:100%;height:46px;border:none;border-radius:23px;background:var(--lime);color:#0A0D12;
  font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:opacity .3s;}
.cta-pill:disabled{opacity:.32;cursor:not-allowed;}
/* outline-glow (the S10 / beta family): dark at rest, lime border, light sweep when armed */
.cta-out{position:relative;display:block;width:100%;height:46px;border-radius:23px;background:rgba(200,255,0,.045);
  border:1px solid color-mix(in srgb,var(--lime) 45%,transparent);color:var(--lime);
  font-family:var(--head);font-size:17px;letter-spacing:.09em;cursor:pointer;overflow:hidden;transition:opacity .3s,box-shadow .3s;}
.cta-out:disabled{opacity:.3;cursor:not-allowed;}
.cta-out:not(:disabled){box-shadow:0 0 18px rgba(200,255,0,.14),inset 0 0 14px rgba(200,255,0,.05);}
.cta-out:not(:disabled)::after{content:"";position:absolute;top:0;bottom:0;width:46px;
  background:linear-gradient(100deg,transparent,rgba(200,255,0,.28),transparent);
  animation:ctaSweep 2.6s var(--ease) infinite;}
@keyframes ctaSweep{0%{left:-25%}55%{left:105%}100%{left:105%}}
.cta-out:not(:disabled):active{background:var(--lime);color:#0A0D12;}
/* band-coloured outline (S5) */
.cta-band{border-color:color-mix(in srgb,var(--sc,var(--lime)) 55%,transparent);color:var(--sc,var(--lime));background:color-mix(in srgb,var(--sc,var(--lime)) 5%,transparent);}
.cta-band:not(:disabled){box-shadow:0 0 18px color-mix(in srgb,var(--sc,var(--lime)) 18%,transparent);}
.cta-band:not(:disabled)::after{background:linear-gradient(100deg,transparent,color-mix(in srgb,var(--sc,var(--lime)) 30%,transparent),transparent);}
.cta-band:not(:disabled):active{background:var(--sc,var(--lime));color:#0A0D12;}

/* S1 · PANEL — glass card (the baseline) */
.s1{padding:14px 18px 12px;border-radius:16px;border:1px solid var(--hair);background:var(--glass);display:flex;align-items:center;gap:14px;transition:border-color .4s,box-shadow .4s;margin-bottom:10px;}
.s1.live{border-color:color-mix(in srgb,var(--sc) 40%,transparent);box-shadow:0 0 22px color-mix(in srgb,var(--sc) 12%,transparent);}
.s1 .num{font-family:var(--head);font-size:42px;line-height:.85;min-width:60px;color:var(--sc,var(--dim));text-shadow:0 0 18px color-mix(in srgb,var(--sc,transparent) 35%,transparent);}
.s1 .k2{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}
.s1 .band{font-family:var(--head);font-size:16px;letter-spacing:.04em;color:var(--sc,var(--mid));margin-top:3px;}
.s1 .mini{display:flex;flex-direction:column;gap:5px;margin-left:auto;}
.s1 .mini i{width:26px;height:3px;border-radius:2px;background:rgba(255,255,255,.1);transition:all .3s;}
.s1 .mini i.on{background:var(--mc);box-shadow:0 0 6px var(--mc);}

/* S2 · INSTRUMENT — card-less §25 read: left rule, big number, hairlines */
.s2{padding:12px 0 12px 15px;border-left:2px solid var(--sc,rgba(255,255,255,.14));margin:2px 0 12px;display:flex;align-items:baseline;gap:14px;transition:border-color .4s;}
.s2 .num{font-family:var(--head);font-size:52px;line-height:.8;color:var(--sc,var(--dim));text-shadow:0 0 20px color-mix(in srgb,var(--sc,transparent) 35%,transparent);}
.s2 .k2{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}
.s2 .band{font-family:var(--head);font-size:19px;letter-spacing:.04em;color:var(--sc,var(--mid));margin-top:2px;}
.s2 .parts{margin-left:auto;text-align:right;font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:var(--mid);line-height:1.9;text-transform:uppercase;}
.s2 .parts b{color:var(--pc);font-weight:500;}

/* S3 · RING — tick-ring gauge + score-carrying pill */
.s3{display:flex;align-items:center;gap:16px;margin-bottom:10px;}
.s3 .rg{position:relative;width:76px;height:76px;flex-shrink:0;}
.s3 canvas{position:absolute;inset:0;width:100%;height:100%;}
.s3 .cnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:26px;color:var(--sc,var(--dim));}
.s3 .k2{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}
.s3 .band{font-family:var(--head);font-size:19px;letter-spacing:.04em;color:var(--sc,var(--mid));margin-top:3px;}
.s3 .hint{font-family:var(--body);font-weight:300;font-size:10.5px;color:var(--mid);margin-top:2px;}

/* S4 · METER — VU ticks + number, scan-sweep CTA */
.s4{margin-bottom:12px;}
.s4 .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.s4 .k2{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}
.s4 .band{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--sc,var(--mid));text-transform:uppercase;}
.s4 .bar{flex:1;display:flex;gap:3px;align-items:center;}
.s4 .bar i{flex:1;height:15px;border-radius:1px;background:rgba(255,255,255,.09);transition:all .2s;}
.s4 .bar i.lit{background:var(--tc);}
.s4 .bar i.tip{box-shadow:0 0 7px var(--tc);height:21px;}
.s4 .num{font-family:var(--head);font-size:30px;color:var(--sc,var(--dim));margin-left:10px;line-height:.8;min-width:44px;text-align:right;}
.s4 .wrap{display:flex;align-items:center;}

/* S5 · STAMP — the score lands big, centered; band-coloured outline CTA */
.s5{text-align:center;padding:4px 0 12px;}
.s5 .num{font-family:var(--head);font-size:64px;line-height:.85;color:var(--sc,var(--dim));text-shadow:0 0 26px color-mix(in srgb,var(--sc,transparent) 40%,transparent);}
.s5 .band{font-family:var(--mono);font-size:9px;letter-spacing:.26em;color:var(--sc,var(--mid));text-transform:uppercase;margin-top:5px;}
.s5 .k2{font-family:var(--mono);font-size:7.5px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;margin-top:4px;}

@media(prefers-reduced-motion:reduce){.ring img{animation:none;}.sl.settle .th,.sl.settle .fill{transition:none;}.cta-out::after{animation:none;display:none;}}
</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="hd"><span class="k">Daily check-in</span><span class="d">Thu 23 Jul</span></div>
  <div class="sub">The one signal you give ZEAL · everything else is read</div>
  <div class="stage" id="stage"></div>
  <div class="tabs" id="tabs"></div>
</div>

<script>
(function(){
  var rm=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var ICON='brand-assets/checkin-icons/';
  var CATS=[
    {id:'energy',  name:'ENERGY',   q:'How alert and ready your body feels', img:ICON+'energy.png',
      levels:['DRAINED','LOW','GOOD','CHARGED']},
    {id:'sleep',   name:'SLEEP',    q:'How last night actually felt', img:ICON+'sleep.png',
      levels:['ROUGH','LIGHT','SOLID','DEEP']},
    {id:'soreness',name:'SORENESS', q:'How your muscles carry yesterday', img:ICON+'soreness.png',
      levels:['WRECKED','SORE','MILD','FRESH']}
  ];
  var GRADE=['#EF4444','#F59E0B','#00E5A0','#C8FF00'];
  var VALS=[25,50,75,100];
  var BANDS=[[85,'STRONG SIGNAL','#C8FF00'],[65,'SOLID','#00E5A0'],[45,'MIXED','#F59E0B'],[0,'ROUGH','#EF4444']];
  var picks=[null,null,null], shownScore=0, scoreRaf=null, svar=0, sent=false;
  function hap(ms){if(navigator.vibrate)navigator.vibrate(ms||8);}
  function band(s){for(var b=0;b<BANDS.length;b++){if(s>=BANDS[b][0])return BANDS[b];}return BANDS[3];}
  function total(){return Math.round(picks.reduce(function(a,p){return a+VALS[p];},0)/3);}
  function allSet(){return picks.indexOf(null)===-1;}

  var SV=[
    {tn:'S1',tk:'Panel'},{tn:'S2',tk:'Instrument'},{tn:'S3',tk:'Ring'},{tn:'S4',tk:'Meter'},{tn:'S5',tk:'Stamp'}
  ];
  var stage=document.getElementById('stage'),tabsEl=document.getElementById('tabs');
  tabsEl.innerHTML=SV.map(function(v,i){return '<button class="tab'+(i===0?' on':'')+'" data-i="'+i+'"><div class="tn">'+v.tn+'</div><div class="tk">'+v.tk+'</div></button>';}).join('');
  tabsEl.addEventListener('click',function(e){var b=e.target.closest('.tab');if(!b)return;
    svar=+b.dataset.i;sent=false;tabsEl.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});b.classList.add('on');renderScoreZone();});

  /* rows — locked design */
  stage.innerHTML=CATS.map(function(c,i){
    return '<div class="row" data-i="'+i+'">'+
      '<div class="rtop"><div class="ring" id="rg'+i+'"><img src="'+c.img+'" alt=""></div>'+
      '<div class="rmid"><div class="rnm">'+c.name+'</div><div class="rq">'+c.q+'</div></div>'+
      '<div class="rend"><div class="rword" id="rw'+i+'">—</div><div class="rsc" id="rs'+i+'"></div></div></div>'+
      '<div class="sl" id="sl'+i+'"><div class="trk"></div><div class="fill"></div>'+
        [0,1,2,3].map(function(j){return '<div class="stop" style="left:calc(13px + (100% - 26px)*'+(j/3)+')"></div>';}).join('')+
        c.levels.map(function(l,j){var pos='calc(13px + (100% - 26px)*'+(j/3)+')';
          return '<div class="lb'+(j===3?' last':'')+'" data-j="'+j+'" style="left:'+pos+'">'+l+'</div>';}).join('')+
        '<div class="th"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#C8FF00"/></svg></div>'+
      '</div>'+
    '</div>';}).join('')+
    '<div id="szone"></div>'+
    '<button class="skip" id="skip">Skip today — ZEAL reads without you →</button>'+
    '<div class="skipped" id="skipped"><div class="b"><svg viewBox="0 0 24 24"><path fill-rule="evenodd" fill="#C8FF00" d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z M11.5 7.5 L12.15 11.5 L12.4 16 L11.95 11.5 Z"/></svg></div>'+
      '<h3>ZEAL READS ON</h3><p>Readiness comes from your wearables — HRV, sleep, recovery.<br>The check-in only sharpens it. Nothing breaks when you skip.</p>'+
      '<div class="m">Passive signals only · today</div></div>';

  document.getElementById('skip').addEventListener('click',function(){
    stage.querySelectorAll('.row,#szone,.skip').forEach(function(n){n.style.display='none';});
    document.getElementById('skipped').classList.add('show');hap(10);
  });

  function countUp(el,to,dur){
    if(rm){el.textContent=to;return;}
    var from=parseInt(el.textContent)||0,t0=null;
    (function step(ts){if(!t0)t0=ts;var p=Math.min(1,(ts-t0)/(dur||500)),e=1-Math.pow(1-p,3);
      el.textContent=Math.round(from+(to-from)*e);if(p<1)requestAnimationFrame(step);})(performance.now());
  }

  /* ══ the 5 score-zone styles (score display + its CTA pairing) ══ */
  function ctaHTML(kind){
    var dis=allSet()&&!sent?'':' disabled';
    if(kind==='pill')      return '<button class="cta-pill" id="cta"'+dis+'>Send signal →</button>';
    if(kind==='pillscore') return '<button class="cta-pill" id="cta"'+dis+'>'+(allSet()?('Send signal · '+total()+' →'):'Send signal →')+'</button>';
    if(kind==='out')       return '<button class="cta-out" id="cta"'+dis+'>SEND SIGNAL →</button>';
    if(kind==='band')      return '<button class="cta-out cta-band" id="cta" style="--sc:'+(allSet()?band(total())[2]:'')+'"'+dis+'>SEND SIGNAL →</button>';
    return '';
  }
  function wireCta(){
    var c=document.getElementById('cta');if(!c)return;
    c.addEventListener('click',function(){sent=true;this.textContent='SIGNAL SENT · '+total();this.disabled=true;hap(16);});
  }
  function renderScoreZone(){
    var z=document.getElementById('szone'),set=picks.filter(function(p){return p!=null;}).length;
    var t=allSet()?total():null,b=t!=null?band(t):null;
    if(svar===0){ // S1 PANEL + lime pill
      z.innerHTML='<div class="s1'+(t!=null?' live':'')+'" style="--sc:'+(b?b[2]:'')+'">'+
        '<div class="num" id="scnum">'+(t!=null?'0':'—')+'</div>'+
        '<div><div class="k2">Check-in score</div><div class="band">'+(t!=null?b[1]:set+' of 3 set')+'</div></div>'+
        '<div class="mini">'+picks.map(function(p){return '<i class="'+(p!=null?'on':'')+'" style="--mc:'+(p!=null?GRADE[p]:'')+'"></i>';}).join('')+'</div>'+
      '</div>'+ctaHTML('pill');
    }
    if(svar===1){ // S2 INSTRUMENT + outline-glow
      z.innerHTML='<div class="s2" style="--sc:'+(b?b[2]:'')+'">'+
        '<div class="num" id="scnum">'+(t!=null?'0':'—')+'</div>'+
        '<div><div class="k2">Check-in score</div><div class="band">'+(t!=null?b[1]:set+' of 3 set')+'</div></div>'+
        '<div class="parts">'+CATS.map(function(c,i){return c.name.slice(0,5)+' <b style="--pc:'+(picks[i]!=null?GRADE[picks[i]]:'var(--dim)')+'">'+(picks[i]!=null?VALS[picks[i]]:'—')+'</b>';}).join('<br>')+'</div>'+
      '</div>'+ctaHTML('out');
    }
    if(svar===2){ // S3 RING + score-carrying pill
      z.innerHTML='<div class="s3" style="--sc:'+(b?b[2]:'')+'">'+
        '<div class="rg"><canvas id="s3cv"></canvas><div class="cnum" id="scnum">'+(t!=null?'0':'—')+'</div></div>'+
        '<div><div class="k2">Check-in score</div><div class="band">'+(t!=null?b[1]:set+' of 3 set')+'</div>'+
        '<div class="hint">Sharpens the readiness ZEAL reads from your wearables</div></div>'+
      '</div>'+ctaHTML('pillscore');
      drawRing(t,b);
    }
    if(svar===3){ // S4 METER + scan-sweep outline
      var N=24,lit=t!=null?Math.round(t/100*N):0;
      z.innerHTML='<div class="s4" style="--sc:'+(b?b[2]:'')+'">'+
        '<div class="top"><span class="k2">Check-in score</span><span class="band">'+(t!=null?b[1]:set+' of 3 set')+'</span></div>'+
        '<div class="wrap"><div class="bar">'+Array(N).fill(0).map(function(_,k){
          var col=t!=null?band(Math.round(((k+1)/N)*100))[2]:'';
          return '<i class="'+(k<lit?'lit':'')+(k===lit-1?' tip':'')+'" style="--tc:'+col+'"></i>';}).join('')+'</div>'+
        '<div class="num" id="scnum">'+(t!=null?'0':'—')+'</div></div>'+
      '</div>'+ctaHTML('out');
    }
    if(svar===4){ // S5 STAMP + band-coloured outline
      z.innerHTML='<div class="s5" style="--sc:'+(b?b[2]:'')+'">'+
        '<div class="num" id="scnum">'+(t!=null?'0':'—')+'</div>'+
        '<div class="band">'+(t!=null?b[1]:set+' of 3 set')+'</div>'+
        '<div class="k2">Check-in score · sharpens the wearable read</div>'+
      '</div>'+ctaHTML('band');
    }
    if(t!=null){countUp(document.getElementById('scnum'),t,600);shownScore=t;}
    wireCta();
  }
  function drawRing(t,b){
    var cv=document.getElementById('s3cv');if(!cv)return;
    var dpr=devicePixelRatio||1,S=76;cv.width=S*dpr;cv.height=S*dpr;
    var ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
    var T=30,R=34,cx=S/2,cy=S/2,a0=135*Math.PI/180,sw=270*Math.PI/180;
    var lit=t!=null?(t/100):0;
    for(var i=0;i<T;i++){var f=i/(T-1),a=a0+f*sw;
      var x1=cx+(R-7)*Math.cos(a),y1=cy+(R-7)*Math.sin(a),x2=cx+R*Math.cos(a),y2=cy+R*Math.sin(a);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineWidth=2.2;ctx.lineCap='round';
      if(f<=lit&&t!=null){ctx.strokeStyle=b[2];ctx.shadowColor=b[2];ctx.shadowBlur=4;}
      else{ctx.strokeStyle='rgba(255,255,255,.1)';ctx.shadowBlur=0;}
      ctx.stroke();}
    ctx.shadowBlur=0;
  }

  /* slider mechanics — locked (smooth drag, settle on release) */
  CATS.forEach(function(c,i){
    var sl=document.getElementById('sl'+i),th=sl.querySelector('.th'),fill=sl.querySelector('.fill');
    var dragging=false;
    function fracFrom(clientX){var r=sl.getBoundingClientRect();return Math.max(0,Math.min(1,(clientX-r.left-13)/(r.width-26)));}
    function paint(f,j){
      th.style.left='calc(13px + (100% - 26px)*'+f+')';
      fill.style.width='calc((100% - 26px)*'+f+')';
      sl.style.setProperty('--rc',GRADE[j]);sl.classList.add('set');
      sl.querySelectorAll('.lb').forEach(function(lb){lb.classList.toggle('on',+lb.dataset.j===j);});
      var w=document.getElementById('rw'+i);w.textContent=c.levels[j];w.style.setProperty('--rc',GRADE[j]);
      var rc=document.getElementById('rs'+i);rc.style.setProperty('--rc',GRADE[j]);
      var rg=document.getElementById('rg'+i);rg.classList.add('lit');rg.style.setProperty('--rc',GRADE[j]);
    }
    function commit(j){
      if(picks[i]!==j){picks[i]=j;sent=false;
        countUp(document.getElementById('rs'+i),VALS[j],420);
        renderScoreZone();}
    }
    function move(clientX){var f=fracFrom(clientX),j=Math.round(f*3);
      sl.classList.remove('settle');paint(f,j);
      if(picks[i]!==j){hap(6);commit(j);}}
    function release(clientX){dragging=false;var f=fracFrom(clientX),j=Math.round(f*3);
      sl.classList.add('settle');paint(j/3,j);commit(j);hap(9);}
    sl.addEventListener('pointerdown',function(e){dragging=true;sl.setPointerCapture(e.pointerId);move(e.clientX);});
    sl.addEventListener('pointermove',function(e){if(dragging)move(e.clientX);});
    sl.addEventListener('pointerup',function(e){if(dragging)release(e.clientX);});
    sl.addEventListener('pointercancel',function(e){if(dragging)release(e.clientX);});
  });

  renderScoreZone();
})();
</script>
</body>
