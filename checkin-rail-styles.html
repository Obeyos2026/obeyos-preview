<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D12">
<title>OBEY OS · Daily Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0D12;--white:#F9FAFB;--muted:#8A93A6;--mid:#747E8C;--dim:#5C6679;--hair:rgba(255,255,255,.08);
  --lime:#C8FF00;--mint:#00E5A0;--amber:#F59E0B;--red:#EF4444;
  --glass:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.018));
  --head:'Bebas Neue',sans-serif;--body:'Inter',sans-serif;--mono:'DM Mono',monospace;--ease:cubic-bezier(.23,1,.32,1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;height:100%;}
body{font-family:var(--body);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
.screen{position:relative;width:100%;max-width:430px;height:100dvh;min-height:780px;overflow:hidden;
  background:var(--bg);background-image:radial-gradient(rgba(200,255,0,.024) 1px,transparent 1px);background-size:28px 28px;}
.screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;background:radial-gradient(120% 50% at 50% 0%,rgba(200,255,0,.045),transparent 55%);}

.hd{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:baseline;justify-content:space-between;padding:20px 22px 0;}
.hd .k{font-family:var(--mono);font-size:9px;letter-spacing:.28em;color:var(--lime);text-transform:uppercase;}
.hd .d{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--dim);text-transform:uppercase;}
.sub{position:absolute;top:44px;left:0;right:0;z-index:20;text-align:center;font-family:var(--mono);font-size:8px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;}

.stage{position:absolute;top:74px;bottom:2.5%;left:0;right:0;z-index:5;padding:0 24px;overflow-y:auto;}

/* row chrome */
.row{padding:15px 0 6px;border-top:1px solid var(--hair);}
.row:first-child{border-top:none;}
.rtop{display:flex;align-items:center;gap:12px;}
.ring{position:relative;width:54px;height:54px;flex-shrink:0;border-radius:50%;border:1px solid var(--hair);background:var(--glass);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:border-color .3s,box-shadow .3s;}
.ring img{width:40px;height:40px;object-fit:contain;mix-blend-mode:screen;
  -webkit-mask:radial-gradient(72% 76% at 50% 50%,#000 58%,transparent 92%);mask:radial-gradient(72% 76% at 50% 50%,#000 58%,transparent 92%);
  animation:icoFloat 5.4s ease-in-out infinite;}
@keyframes icoFloat{0%,100%{transform:translateY(-1.5px) rotate(-2deg)}50%{transform:translateY(2px) rotate(2deg)}}
.ring.lit{border-color:color-mix(in srgb,var(--rc) 55%,transparent);box-shadow:0 0 14px color-mix(in srgb,var(--rc) 30%,transparent);}
.rmid{flex:1;min-width:0;}
.rnm{font-family:var(--head);font-size:20px;letter-spacing:.03em;}
.rq{font-family:var(--body);font-weight:300;font-size:11px;color:var(--mid);margin-top:1px;}
.rword{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--rc,var(--dim));text-transform:uppercase;text-align:right;min-width:60px;transition:color .3s;}

/* THE SLIDER — unset reads unset; thumb follows the finger; settles on release */
.sl{position:relative;height:64px;margin-top:4px;touch-action:none;cursor:pointer;}
.sl .trk{position:absolute;left:13px;right:13px;top:24px;height:1.5px;background:rgba(255,255,255,.13);border-radius:1px;}
.sl .fill{position:absolute;left:13px;top:24px;height:1.5px;width:0;background:var(--rc,transparent);
  box-shadow:0 0 8px color-mix(in srgb,var(--rc,transparent) 60%,transparent);}
.sl .stop{position:absolute;top:24px;width:1.5px;height:7px;transform:translate(-50%,-50%);background:rgba(255,255,255,.22);}
.sl .lb{position:absolute;top:40px;transform:translateX(-50%);font-family:var(--mono);font-size:7px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;transition:color .25s;white-space:nowrap;}
.sl .lb:first-of-type{transform:none;}
.sl .lb.last{transform:translateX(-100%);}
.sl .lb.on{color:var(--rc);}
.sl .th{position:absolute;top:24px;left:13px;width:26px;height:26px;transform:translate(-50%,-50%);border-radius:50%;
  background:#0A0D12;border:2px solid var(--rc,rgba(255,255,255,.22));
  box-shadow:0 0 10px color-mix(in srgb,var(--rc,transparent) 45%,transparent);
  display:flex;align-items:center;justify-content:center;z-index:2;}
.sl .th svg{width:12px;height:12px;opacity:.45;transition:opacity .25s;filter:drop-shadow(0 0 5px rgba(200,255,0,.5));}
.sl.set .th svg{opacity:1;}
.sl.settle .th,.sl.settle .fill{transition:left .28s var(--ease),width .28s var(--ease);}

/* ACCUMULATIVE SCORE — assembles before send */
.score{margin-top:12px;padding:15px 18px 13px;border-radius:16px;border:1px solid var(--hair);background:var(--glass);
  display:flex;align-items:center;gap:14px;transition:border-color .4s,box-shadow .4s;}
.score.live{border-color:color-mix(in srgb,var(--sc) 40%,transparent);box-shadow:0 0 22px color-mix(in srgb,var(--sc) 12%,transparent);}
.score .num{font-family:var(--head);font-size:44px;line-height:.85;min-width:64px;color:var(--sc,var(--dim));text-shadow:0 0 18px color-mix(in srgb,var(--sc,transparent) 35%,transparent);}
.score .mid2{flex:1;}
.score .k2{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}
.score .band{font-family:var(--head);font-size:17px;letter-spacing:.04em;color:var(--sc,var(--mid));margin-top:3px;}
.score .hint{font-family:var(--body);font-weight:300;font-size:10.5px;color:var(--mid);margin-top:2px;}
.score .mini{display:flex;flex-direction:column;gap:5px;}
.score .mini i{width:26px;height:3px;border-radius:2px;background:rgba(255,255,255,.1);transition:background .3s,box-shadow .3s;}
.score .mini i.on{background:var(--mc);box-shadow:0 0 6px var(--mc);}

.cta{display:block;width:100%;height:46px;margin-top:12px;border:none;border-radius:23px;background:var(--lime);color:#0A0D12;
  font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:opacity .3s;}
.cta:disabled{opacity:.32;cursor:not-allowed;}
.skip{display:block;width:100%;background:none;border:none;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;cursor:pointer;padding:12px 0 4px;text-align:center;}
.skipped{display:none;text-align:center;padding-top:8vh;}
.skipped.show{display:block;}
.skipped .b{width:52px;height:52px;margin:0 auto 14px;filter:drop-shadow(0 0 10px rgba(200,255,0,.5));}
.skipped .b svg{width:100%;height:100%;}
.skipped h3{font-family:var(--head);font-size:30px;letter-spacing:.03em;}
.skipped p{font-family:var(--body);font-weight:300;font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5;}
.skipped .m{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-top:14px;}

@media(prefers-reduced-motion:reduce){.ring img{animation:none;}.sl.settle .th,.sl.settle .fill{transition:none;}}
</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="hd"><span class="k">Daily check-in</span><span class="d">Thu 23 Jul</span></div>
  <div class="sub">The one signal you give ZEAL · everything else is read</div>
  <div class="stage" id="stage"></div>
</div>

<script>
(function(){
  var rm=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var ICON='brand-assets/checkin-icons/';
  var CATS=[
    {id:'energy',  name:'ENERGY',   q:'How alert and ready your body feels', img:ICON+'energy.png',
      levels:['DRAINED','LOW','GOOD','CHARGED']},
    {id:'sleep',   name:'SLEEP',    q:'How last night actually felt', img:ICON+'sleep.png',
      levels:['ROUGH','LIGHT','SOLID','DEEP']},
    {id:'soreness',name:'SORENESS', q:'How your muscles carry yesterday', img:ICON+'soreness.png',
      levels:['WRECKED','SORE','MILD','FRESH']}
  ];
  var GRADE=['#EF4444','#F59E0B','#00E5A0','#C8FF00'];       // founder pick: verdict-colour grade
  var VALS=[25,50,75,100];                                    // each level's contribution
  var BANDS=[[85,'STRONG SIGNAL','#C8FF00'],[65,'SOLID','#00E5A0'],[45,'MIXED','#F59E0B'],[0,'ROUGH','#EF4444']];
  var picks=[null,null,null], shownScore=0, scoreRaf=null;
  function hap(ms){if(navigator.vibrate)navigator.vibrate(ms||8);}

  var stage=document.getElementById('stage');
  stage.innerHTML=CATS.map(function(c,i){
    return '<div class="row" data-i="'+i+'">'+
      '<div class="rtop"><div class="ring" id="rg'+i+'"><img src="'+c.img+'" alt=""></div>'+
      '<div class="rmid"><div class="rnm">'+c.name+'</div><div class="rq">'+c.q+'</div></div>'+
      '<div class="rword" id="rw'+i+'">—</div></div>'+
      '<div class="sl" id="sl'+i+'"><div class="trk"></div><div class="fill"></div>'+
        [0,1,2,3].map(function(j){var p=j/3*100;return '<div class="stop" style="left:calc(13px + (100% - 26px)*'+(j/3)+')"></div>';}).join('')+
        c.levels.map(function(l,j){var pos='calc(13px + (100% - 26px)*'+(j/3)+')';
          return '<div class="lb'+(j===3?' last':'')+'" data-j="'+j+'" style="left:'+pos+'">'+l+'</div>';}).join('')+
        '<div class="th"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#C8FF00"/></svg></div>'+
      '</div>'+
    '</div>';}).join('')+
    '<div class="score" id="score">'+
      '<div class="num" id="scnum">—</div>'+
      '<div class="mid2"><div class="k2">Check-in score</div><div class="band" id="scband">Set all three</div>'+
      '<div class="hint" id="schint">Sharpens the readiness ZEAL reads from your wearables</div></div>'+
      '<div class="mini">'+CATS.map(function(c,i){return '<i id="mn'+i+'"></i>';}).join('')+'</div>'+
    '</div>'+
    '<button class="cta" id="cta" disabled>Send signal →</button>'+
    '<button class="skip" id="skip">Skip today — ZEAL reads without you →</button>'+
    '<div class="skipped" id="skipped"><div class="b"><svg viewBox="0 0 24 24"><path fill-rule="evenodd" fill="#C8FF00" d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z M11.5 7.5 L12.15 11.5 L12.4 16 L11.95 11.5 Z"/></svg></div>'+
      '<h3>ZEAL READS ON</h3><p>Readiness comes from your wearables — HRV, sleep, recovery.<br>The check-in only sharpens it. Nothing breaks when you skip.</p>'+
      '<div class="m">Passive signals only · today</div></div>';

  function band(s){for(var b=0;b<BANDS.length;b++){if(s>=BANDS[b][0])return BANDS[b];}return BANDS[3];}
  function updateScore(){
    var set=picks.filter(function(p){return p!=null;});
    picks.forEach(function(p,i){var m=document.getElementById('mn'+i);
      if(p!=null){m.classList.add('on');m.style.setProperty('--mc',GRADE[p]);}else{m.classList.remove('on');}});
    var sc=document.getElementById('score');
    if(set.length<3){
      document.getElementById('scband').textContent=set.length+' of 3 set';
      return;
    }
    var target=Math.round(picks.reduce(function(a,p){return a+VALS[p];},0)/3);
    var b=band(target);
    sc.classList.add('live');sc.style.setProperty('--sc',b[2]);
    document.getElementById('scband').textContent=b[1];
    document.getElementById('cta').disabled=false;
    // count-up — the calculating pulse
    if(scoreRaf)cancelAnimationFrame(scoreRaf);
    var from=shownScore||0,t0=null,el=document.getElementById('scnum');
    if(rm){el.textContent=target;shownScore=target;return;}
    (function step(ts){
      if(!t0)t0=ts;var p=Math.min(1,(ts-t0)/650),e=1-Math.pow(1-p,3);
      var v=Math.round(from+(target-from)*e);el.textContent=v;
      if(p<1)scoreRaf=requestAnimationFrame(step);else shownScore=target;
    })(performance.now());
  }

  /* slider — thumb FOLLOWS the finger; snaps to the nearest stop on release */
  CATS.forEach(function(c,i){
    var sl=document.getElementById('sl'+i),th=sl.querySelector('.th'),fill=sl.querySelector('.fill');
    var dragging=false;
    function fracFrom(clientX){
      var r=sl.getBoundingClientRect();
      return Math.max(0,Math.min(1,(clientX-r.left-13)/(r.width-26)));
    }
    function paint(f,j){
      var pos='calc(13px + (100% - 26px)*'+f+')';
      th.style.left=pos;
      fill.style.width='calc((100% - 26px)*'+f+')';
      sl.style.setProperty('--rc',GRADE[j]);sl.classList.add('set');
      sl.querySelectorAll('.lb').forEach(function(lb){lb.classList.toggle('on',+lb.dataset.j===j);});
      var w=document.getElementById('rw'+i);w.textContent=c.levels[j];w.style.setProperty('--rc',GRADE[j]);
      var rg=document.getElementById('rg'+i);rg.classList.add('lit');rg.style.setProperty('--rc',GRADE[j]);
    }
    function move(clientX){
      var f=fracFrom(clientX),j=Math.round(f*3);
      sl.classList.remove('settle');            // free — follows the finger exactly
      paint(f,j);
      if(picks[i]!==j){picks[i]=j;hap(6);updateScore();}
    }
    function release(clientX){
      dragging=false;
      var f=fracFrom(clientX),j=Math.round(f*3);
      sl.classList.add('settle');               // ease into the stop — a measurement settling
      paint(j/3,j);
      if(picks[i]!==j){picks[i]=j;updateScore();}
      hap(9);
    }
    sl.addEventListener('pointerdown',function(e){dragging=true;sl.setPointerCapture(e.pointerId);move(e.clientX);});
    sl.addEventListener('pointermove',function(e){if(dragging)move(e.clientX);});
    sl.addEventListener('pointerup',function(e){if(dragging)release(e.clientX);});
    sl.addEventListener('pointercancel',function(e){if(dragging)release(e.clientX);});
  });

  document.getElementById('cta').addEventListener('click',function(){this.textContent='SIGNAL SENT · '+shownScore;this.disabled=true;hap(16);});
  document.getElementById('skip').addEventListener('click',function(){
    stage.querySelectorAll('.row,.score,.cta,.skip').forEach(function(n){n.style.display='none';});
    document.getElementById('skipped').classList.add('show');hap(10);
  });
})();
</script>
</body>
</html>
