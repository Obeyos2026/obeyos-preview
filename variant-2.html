<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#0A0D12">
<title>OBEY OS · Variant 2 · Aurora</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0D12;--white:#F9FAFB;--muted:#8A93A6;--mid:#747E8C;--dim:#5C6679;--hair:rgba(255,255,255,.1);--lime:#C8FF00;--mint:#00E5A0;--amber:#F59E0B;--red:#EF4444;--cyan:#00D4FF;--good:#22C55E;--vc:var(--mint);--head:'Bebas Neue',sans-serif;--body:'Inter',-apple-system,sans-serif;--mono:'DM Mono',monospace;--ease:cubic-bezier(.23,1,.32,1);}
*{box-sizing:border-box;margin:0;padding:0;}html,body{background:#05070a;height:100%;}
body{font-family:var(--body);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
.screen{width:100%;max-width:430px;min-height:100dvh;position:relative;overflow:hidden;background:var(--bg);padding:14px 20px 96px;}
/* dawn photo atmosphere */
.bg{position:absolute;inset:0;z-index:0;background:url('atm-track-dawn-01.png') center top/cover no-repeat;opacity:.5;}
.bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,13,18,.35) 0%,rgba(10,13,18,.55) 34%,rgba(10,13,18,.86) 60%,#0A0D12 82%);}
.dg{position:absolute;inset:0;z-index:0;background-image:radial-gradient(rgba(200,255,0,.02) 1px,transparent 1px);background-size:28px 28px;}
.screen>*{position:relative;z-index:2;}
.vlabel{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:9;font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;background:rgba(10,13,18,.7);padding:3px 12px;border-radius:20px;border:1px solid var(--hair);}
.fade{opacity:0;transform:translateY(9px);transition:opacity .6s var(--ease),transform .6s var(--ease);}.screen.play .fade{opacity:1;transform:none;}
.hd{display:flex;align-items:center;gap:10px;}
.icobtn{width:36px;height:36px;border-radius:12px;border:1px solid var(--hair);background:rgba(255,255,255,.05);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;}.icobtn svg{width:17px;height:17px;stroke:var(--white);fill:none;stroke-width:1.6;}
.title{flex:1;}.title .wm{display:flex;align-items:center;gap:6px;font-family:var(--head);font-size:17px;letter-spacing:.05em;}.title .wm svg{width:14px;height:14px;filter:drop-shadow(0 0 6px rgba(200,255,0,.7));}.title .wm .b{color:var(--lime);}.title .d{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-top:2px;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.av{width:34px;height:34px;border-radius:50%;border:1px solid var(--hair);background:rgba(255,255,255,.08);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--white);}
.sync{display:flex;align-items:center;gap:8px;margin-top:16px;}.sync .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.65);text-transform:uppercase;display:flex;align-items:center;gap:6px;text-shadow:0 1px 4px rgba(0,0,0,.6);}.sync .dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 7px var(--good);animation:sp 2.4s var(--ease) infinite;}@keyframes sp{0%,100%{opacity:.45;}50%{opacity:1;}}.sync .logos{display:flex;gap:6px;margin-left:auto;}
.chip{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:20px;background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border:1px solid var(--hair);font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:rgba(255,255,255,.8);text-transform:uppercase;}.chip svg{width:10px;height:10px;fill:none;stroke:rgba(255,255,255,.8);stroke-width:1.4;}.chip.off{opacity:.4;}
/* VERDICT = the hero, huge over the dawn */
.hero{text-align:center;margin-top:64px;}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.32em;color:rgba(255,255,255,.55);text-transform:uppercase;text-shadow:0 1px 6px rgba(0,0,0,.7);}
.vword-wrap{position:relative;display:inline-block;margin-top:6px;line-height:.78;}
.vscan{position:absolute;inset:-14px -22px;-webkit-mask:repeating-linear-gradient(90deg,transparent 0,transparent 6px,#000 7px,#000 8px);mask:repeating-linear-gradient(90deg,transparent 0,transparent 6px,#000 7px,#000 8px);}
.vscan::after{content:"";position:absolute;inset:0;opacity:0;background:radial-gradient(circle at 50% 50%,var(--vc) 0%,transparent 55%);-webkit-mask:radial-gradient(circle at 50% 50%,transparent 0%,transparent 8%,#000 30%);mask:radial-gradient(circle at 50% 50%,transparent 0%,transparent 8%,#000 30%);transform:translateX(-58%);}
.screen.play .vscan::after{animation:sw 2.3s var(--ease) .5s forwards;}@keyframes sw{0%{opacity:0;transform:translateX(-58%);}16%{opacity:.9;}100%{opacity:0;transform:translateX(58%);}}
.vword{position:relative;z-index:2;font-family:var(--head);font-size:112px;letter-spacing:.01em;color:var(--vc);text-shadow:0 0 50px color-mix(in srgb,var(--vc) 50%,transparent),0 2px 30px rgba(0,0,0,.5);}
.pill{display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:7px 16px;border-radius:24px;background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid var(--hair);font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.85);text-transform:uppercase;}
.pill b{font-family:var(--head);font-size:20px;color:var(--vc);letter-spacing:.02em;line-height:1;}
.directive{font-weight:300;font-size:18px;margin-top:18px;line-height:1.4;text-shadow:0 1px 8px rgba(0,0,0,.6);}.directive .sub{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-top:6px;}
/* signals = frosted glass 270 gauges */
.sec-lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;color:rgba(255,255,255,.5);text-transform:uppercase;margin:34px 0 14px;display:flex;justify-content:space-between;}.sec-lbl a{color:rgba(255,255,255,.6);text-decoration:none;}
.sigs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.sg{display:flex;flex-direction:column;align-items:center;gap:8px;padding:13px 4px;border-radius:16px;background:rgba(255,255,255,.05);backdrop-filter:blur(16px) saturate(116%);border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.06);animation:flo 4.6s ease-in-out infinite;}
.sg:nth-child(2){animation-delay:-1.15s}.sg:nth-child(3){animation-delay:-2.3s}.sg:nth-child(4){animation-delay:-3.45s}
@keyframes flo{0%,100%{transform:translateY(-3.5px)}50%{transform:translateY(3.5px)}}
.ring{position:relative;width:60px;height:60px;}.ring svg{width:100%;height:100%;overflow:visible;transform:rotate(135deg);}
.ring .t{fill:none;stroke:rgba(255,255,255,.14);stroke-width:5;stroke-linecap:round;stroke-dasharray:102 200;}
.ring .a{fill:none;stroke:var(--sig);stroke-width:5;stroke-linecap:round;stroke-dasharray:102 200;stroke-dashoffset:102;filter:drop-shadow(0 0 5px color-mix(in srgb,var(--sig) 60%,transparent));transition:stroke-dashoffset 1.1s var(--ease) var(--d,1s);}
.screen.play .ring .a{stroke-dashoffset:var(--o,48);}
.ring .ico{position:absolute;top:11px;left:0;right:0;display:flex;justify-content:center;}.ring .ico svg{width:12px;height:12px;transform:none;stroke:var(--sig);fill:none;stroke-width:1.7;}
.ring .v{position:absolute;left:0;right:0;bottom:10px;text-align:center;font-family:var(--head);font-size:18px;line-height:.9;}.ring .v small{font-family:var(--mono);font-size:7px;color:rgba(255,255,255,.5);}
.nm{font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:rgba(255,255,255,.7);text-transform:uppercase;}
.sg.you .nm{color:var(--cyan);}.sg.you .ring .v{font-family:var(--mono);font-size:11px;color:var(--cyan);}
.trend{margin-top:20px;padding:14px 12px 10px;border-radius:16px;background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);}
.trend .th{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:4px;}.trend .th b{color:var(--mint);}
.tcv{width:100%;height:70px;overflow:visible;}.tcv .line{fill:none;stroke:var(--mint);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 6px rgba(0,229,160,.55));stroke-dasharray:900;stroke-dashoffset:900;transition:stroke-dashoffset 1.6s var(--ease) 1.2s;}.screen.play .tcv .line{stroke-dashoffset:0;}.tcv .pt{fill:#0A0D12;stroke:var(--mint);stroke-width:1.6;}.tcv .today{fill:var(--mint);stroke:none;filter:drop-shadow(0 0 6px var(--mint));}
.cta{margin-top:20px;display:block;width:100%;height:48px;border:none;border-radius:24px;background:var(--lime);color:#0A0D12;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:74px;background:rgba(10,13,18,.82);backdrop-filter:blur(16px);border-top:1px solid var(--hair);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:12px;z-index:5;}
.nav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;}.nav a svg{width:19px;height:19px;stroke:var(--dim);fill:none;stroke-width:1.5;}.nav a.on{color:var(--lime);}.nav a.on svg{stroke:var(--lime);filter:drop-shadow(0 0 6px rgba(200,255,0,.5));}
@media(prefers-reduced-motion:reduce){.fade{opacity:1;transform:none;transition:none;}.sg{animation:none;}.ring .a{transition:none;stroke-dashoffset:var(--o,48);}.tcv .line{transition:none;stroke-dashoffset:0;}.vscan::after{animation:none;opacity:.3;transform:none;}.sync .dot{animation:none;}}
</style></head><body>
<div class="vlabel">Variant 2 · Aurora</div>
<div class="screen" id="screen">
  <div class="bg"></div><div class="dg"></div>
  <div class="hd fade"><button class="icobtn"><svg viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="16" rx="2.5"/><path d="M3.5 9.5h17M8 3v3M16 3v3"/></svg></button><div class="title"><div class="wm"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#C8FF00"/></svg><span>OBEY</span> <span class="b">OS</span></div><div class="d">Today · Tue 20 Jul</div></div><div class="av">R</div></div>

<script>
(function(){var rm=matchMedia('(prefers-reduced-motion:reduce)').matches;var scr=document.getElementById('screen');
var v=[64,58,71,66,79,74,84],W=400,H=70,P=14;function xy(i,x){return[P+(W-2*P)*(i/6),H-8-(H-18)*((x-30)/60)];}var p=v.map(function(x,i){return xy(i,x);});
function sm(q){var d='M'+q[0][0]+','+q[0][1];for(var i=0;i<q.length-1;i++){var a=q[i-1]||q[i],b=q[i],c=q[i+1],e=q[i+2]||c;d+=' C'+(b[0]+(c[0]-a[0])/6)+','+(b[1]+(c[1]-a[1])/6)+' '+(c[0]-(e[0]-b[0])/6)+','+(c[1]-(e[1]-b[1])/6)+' '+c[0]+','+c[1];}return d;}
document.getElementById('line').setAttribute('d',sm(p));var g=document.getElementById('pts');p.forEach(function(q,i){var c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',q[0]);c.setAttribute('cy',q[1]);c.setAttribute('r',i===6?4:2.6);c.setAttribute('class',i===6?'pt today':'pt');g.appendChild(c);});
requestAnimationFrame(function(){requestAnimationFrame(function(){scr.classList.add('play');});});
function cu(el,to,du,de,dec){if(rm){el.childNodes[0].nodeValue=dec?to.toFixed(1):to;return;}setTimeout(function(){var t0=null;function s(ts){if(!t0)t0=ts;var pr=Math.min(1,(ts-t0)/du),e=1-Math.pow(1-pr,3),x=e*to;el.childNodes[0].nodeValue=dec?x.toFixed(1):Math.round(x);if(pr<1)requestAnimationFrame(s);}requestAnimationFrame(s);},de);}
cu(document.getElementById('score'),84,1500,300,false);document.querySelectorAll('.sg .v[data-to]').forEach(function(el,i){var to=+el.getAttribute('data-to');cu(el,to,1100,1000+i*100,to%1!==0);});
})();
</script></body></html>
