<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D12">
<title>OBEY OS · Dashed ring mock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0D12;--white:#F9FAFB;--muted:#8A93A6;--dim:#5C6679;--hair:rgba(255,255,255,.08);
  --lime:#C8FF00;--mint:#00E5A0;--amber:#F59E0B;--good:#22C55E;
  --head:'Bebas Neue',sans-serif;--body:'Inter',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#05070a;height:100%;}
body{background:var(--bg);background-image:radial-gradient(rgba(200,255,0,.026) 1px,transparent 1px);background-size:28px 28px;color:var(--white);font-family:var(--body);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;min-height:100dvh;padding:26px 20px 60px;}
h1{font-family:var(--head);font-size:30px;letter-spacing:.03em;margin-bottom:4px;}
.sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin-bottom:30px;text-align:center;}
.row{display:flex;gap:8px;margin-bottom:14px;}
.tg{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:7px 13px;border-radius:14px;border:1px solid var(--hair);background:rgba(255,255,255,.022);color:var(--muted);cursor:pointer;}
.tg.on{background:var(--lime);color:#0A0D12;border-color:var(--lime);}
.stage{display:flex;flex-direction:column;align-items:center;gap:40px;margin-top:26px;}
.g{position:relative;display:flex;flex-direction:column;align-items:center;}
.g canvas{display:block;}
.g .ctr{position:absolute;left:0;right:0;top:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.g .num{font-family:var(--head);color:var(--white);line-height:.8;}
.g .u{font-family:var(--mono);letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin-top:4px;}
.g .cap{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:6px;}
.note{font-family:var(--body);font-weight:300;font-size:12.5px;color:var(--muted);max-width:320px;text-align:center;line-height:1.55;margin-top:34px;}
.note b{color:var(--white);font-weight:500;}
</style>
</head>
<body>
<h1>DASHED RINGS — MOCK</h1>
<div class="sub">Ticks instead of a solid fill · no needle</div>
<div class="row">
  <button class="tg on" data-t="thin">Thin ticks</button>
  <button class="tg" data-t="med">Medium</button>
  <button class="tg" data-t="chunky">Chunky</button>
</div>
<div class="stage" id="stage">
  <div class="g" data-c="var(--mint)" data-f="0.84" data-num="84" data-u="Readiness" data-cap="Readiness · big" data-size="210" data-fs="66"></div>
  <div class="g" data-c="var(--good)" data-f="0.33" data-num="55" data-u="BPM" data-cap="RHR detail" data-size="168" data-fs="52"></div>
  <div class="g" data-c="var(--lime)" data-f="0.60" data-num="68" data-u="MS" data-cap="Signal card · small" data-size="118" data-fs="34"></div>
</div>
<div class="note"><b>Dashed gauge:</b> a 240° arc of tick marks opening at the bottom — lit up to the value, dim after. No needle, no solid arc. Toggle the tick weight above.</div>

<script>
(function(){
  var STYLES={ thin:{ticks:52,len:0.10,w:1.6,gap:0}, med:{ticks:40,len:0.13,w:2.6,gap:0}, chunky:{ticks:30,len:0.17,w:4,gap:0} };
  var cur='thin';
  var els=[].slice.call(document.querySelectorAll('.g'));
  function color(v){ var d=document.createElement('div'); d.style.color=v.indexOf('var(')===0?getComputedStyle(document.documentElement).getPropertyValue(v.slice(4,-1)).trim():v; return d.style.color; }
  function build(){
    els.forEach(function(g){
      var size=+g.dataset.size, dpr=window.devicePixelRatio||1;
      var c=color(g.dataset.c), frac=+g.dataset.f;
      g.innerHTML='<canvas></canvas><div class="ctr" style="height:'+size+'px"><div class="num" style="font-size:'+g.dataset.fs+'px">'+g.dataset.num+'</div><div class="u">'+g.dataset.u+'</div></div><div class="cap">'+g.dataset.cap+'</div>';
      var cv=g.querySelector('canvas'); cv.style.width=size+'px'; cv.style.height=size+'px'; cv.width=Math.round(size*dpr); cv.height=Math.round(size*dpr);
      var ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
      var S=STYLES[cur];
      draw(ctx,size,S,c,frac,0);
      // animate lit fraction 0->frac
      var start=null,dur=1100;
      function step(ts){ if(!start)start=ts; var p=Math.min(1,(ts-start)/dur),e=1-Math.pow(1-p,3); ctx.clearRect(0,0,size,size); draw(ctx,size,S,c,frac,e); if(p<1)requestAnimationFrame(step); }
      requestAnimationFrame(step);
    });
  }
  function draw(ctx,size,S,c,frac,prog){
    var cx=size/2, cy=size/2, R=size/2-8, tickLen=R*S.len;
    var startA=150*Math.PI/180, sweep=240*Math.PI/180;
    var litFrac=frac*prog;
    for(var i=0;i<S.ticks;i++){
      var t=i/(S.ticks-1), ang=startA+t*sweep;
      var x1=cx+(R-tickLen)*Math.cos(ang), y1=cy+(R-tickLen)*Math.sin(ang);
      var x2=cx+R*Math.cos(ang), y2=cy+R*Math.sin(ang);
      var lit=t<=litFrac;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      ctx.lineWidth=S.w; ctx.lineCap='round';
      if(lit){ ctx.strokeStyle=c; ctx.shadowColor=c; ctx.shadowBlur=7; }
      else { ctx.strokeStyle='rgba(255,255,255,.13)'; ctx.shadowBlur=0; }
      ctx.stroke();
    }
    ctx.shadowBlur=0;
  }
  document.querySelectorAll('.tg').forEach(function(b){ b.addEventListener('click',function(){ document.querySelectorAll('.tg').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); cur=b.dataset.t; build(); }); });
  build();
})();
</script>
</body>
</html>
