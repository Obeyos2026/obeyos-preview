<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D12">
<title>OBEY OS · Calibration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
:root{--bg:#0A0D12;--white:#F9FAFB;--muted:#8A93A6;--mid:#747E8C;--dim:#5C6679;--hair:rgba(255,255,255,.08);
  --lime:#C8FF00;--sig:var(--lime);--head:'Bebas Neue',sans-serif;--body:'Inter',sans-serif;--mono:'DM Mono',monospace;--ease:cubic-bezier(.23,1,.32,1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;height:100%;}
body{font-family:var(--body);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
.screen{position:relative;width:100%;max-width:430px;height:100dvh;min-height:760px;overflow:hidden;
  background:var(--bg);background-image:radial-gradient(rgba(200,255,0,.022) 1px,transparent 1px);background-size:28px 28px;}
.screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:9;background:radial-gradient(120% 55% at 50% 6%,rgba(200,255,0,.05),transparent 52%);}

.chead{position:absolute;top:5.5%;left:0;right:0;text-align:center;z-index:8;}
.chead .k{font-family:var(--mono);font-size:9px;letter-spacing:.32em;color:var(--sig);text-transform:uppercase;}
.chead .st{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-top:9px;height:12px;}
.pbar{width:126px;height:2px;border-radius:2px;background:rgba(255,255,255,.1);margin:13px auto 0;overflow:hidden;}
.pbar i{display:block;height:100%;width:0;background:var(--sig);box-shadow:0 0 8px var(--sig);}

/* V5 — body scan */
model-viewer{position:absolute;top:12%;left:0;right:0;height:33%;background:transparent;--poster-color:transparent;outline:none;
  filter:brightness(.46) contrast(1.12) saturate(.72);z-index:2;}
.scanglow{position:absolute;left:0;right:0;height:60px;background:linear-gradient(180deg,rgba(200,255,0,.13),transparent);z-index:3;pointer-events:none;opacity:0;}
.scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--sig) 22%,var(--sig) 78%,transparent);box-shadow:0 0 18px 3px rgba(200,255,0,.5);z-index:4;pointer-events:none;opacity:0;}

/* V1 — the record */
.log{position:absolute;left:26px;right:26px;top:49%;z-index:7;font-family:var(--mono);}
.log .hdln{font-family:var(--mono);font-size:8px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;padding-bottom:10px;margin-bottom:4px;border-bottom:1px solid var(--hair);}
.ln{display:flex;align-items:baseline;font-size:11.5px;line-height:2.05;opacity:0;transform:translateX(-5px);}
.ln.in{opacity:1;transform:none;transition:opacity .3s var(--ease),transform .3s var(--ease);}
.ln .k{color:var(--mid);white-space:nowrap;}
.ln .lead{flex:1;overflow:hidden;color:var(--dim);letter-spacing:2px;margin:0 8px;height:1em;}
.ln .v{color:var(--dim);white-space:nowrap;transition:color .2s;}
.ln.done .k{color:var(--muted);}
.ln.done .v{color:var(--white);}
.ln .v b{color:var(--sig);font-weight:500;}

.foot{position:absolute;left:0;right:0;bottom:5%;z-index:7;text-align:center;}
.foot .b{width:16px;height:16px;margin:0 auto 8px;filter:drop-shadow(0 0 6px rgba(200,255,0,.6));}
.foot .b svg{width:100%;height:100%;}
.foot .t{font-family:var(--mono);font-size:8px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase;}
@media(prefers-reduced-motion:reduce){model-viewer{filter:brightness(.5) contrast(1.1) saturate(.72);}}
</style>
</head>
<body>
<div class="screen" id="screen">
  <model-viewer id="mv" src="brand-assets/body-model/3d/obeyos-model-male-3d.glb" auto-rotate auto-rotate-delay="0" rotation-per-second="18deg" camera-orbit="0deg 90deg 100%" camera-target="0m 0m 0m" field-of-view="26deg" exposure="0.72" environment-image="neutral" shadow-intensity="0" disable-zoom disable-pan interaction-prompt="none" loading="eager"></model-viewer>
  <div class="scanglow" id="glow"></div>
  <div class="scanline" id="line"></div>

  <div class="chead"><div class="k">ZEAL · Calibration</div><div class="st" id="st">Powering the engine</div><div class="pbar"><i id="pf"></i></div></div>

  <div class="log" id="log"><div class="hdln">Read · your signals</div></div>

  <div class="foot">
    <div class="b"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#C8FF00"/></svg></div>
    <div class="t">ZEAL engine · do not close</div>
  </div>
</div>

<script>
(function(){
  var rm=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var screen=document.getElementById('screen'),line=document.getElementById('line'),glow=document.getElementById('glow'),st=document.getElementById('st'),pf=document.getElementById('pf'),log=document.getElementById('log');

  var LOG=[['read body composition','22% <b>BF</b>'],
    ['estimate skeletal muscle','42% <b>SMM</b>'],
    ['pull overnight recovery','68 · 8.1H'],
    ['map injury history','<b>L-KNEE</b>'],
    ['match program library','31 → <b>1</b>'],
    ['lock training tier','TIER <b>2</b>']];
  LOG.forEach(function(r,i){var d=document.createElement('div');d.className='ln';d.id='ln'+i;
    d.innerHTML='<span class="k">'+r[0]+'</span><span class="lead"></span><span class="v" id="lv'+i+'"></span>';log.appendChild(d);});

  var timers=[];
  function T(f,m){var id=setTimeout(f,m);timers.push(id);return id;}
  function raf(f){var id=requestAnimationFrame(f);timers.push(id);return id;}
  function clr(){timers.forEach(function(t){clearTimeout(t);cancelAnimationFrame(t);});timers=[];}

  function printLine(i){
    var ln=document.getElementById('ln'+i),lead=ln.querySelector('.lead'),v=document.getElementById('lv'+i);
    ln.classList.add('in');lead.textContent=new Array(26).join('.');
    T(function(){v.innerHTML=LOG[i][1];ln.classList.add('done');},260);
  }

  function play(){
    clr();
    LOG.forEach(function(r,i){var ln=document.getElementById('ln'+i);ln.className='ln';document.getElementById('lv'+i).innerHTML='';ln.querySelector('.lead').textContent='';});
    line.style.opacity='0';glow.style.opacity='0';
    st.textContent='Powering the engine';pf.style.transition='none';pf.style.width='0';

    var mv=document.getElementById('mv'),box=mv.getBoundingClientRect(),sc=screen.getBoundingClientRect();
    var top=box.top-sc.top,bot=box.bottom-sc.top,SCAN=2600;
    var LOGSTART=900,GAP=780,TOTAL=LOGSTART+LOG.length*GAP+400;
    T(function(){pf.style.transition='width '+(TOTAL/1000)+'s linear';pf.style.width='100%';},60);

    // V5 — scan the body once
    T(function(){
      line.style.opacity='1';glow.style.opacity='1';
      var start=null;
      function step(ts){if(!start)start=ts;var t=Math.min(1,(ts-start)/SCAN);var y=top+(bot-top)*t;
        line.style.top=y+'px';glow.style.top=(y-56)+'px';
        st.textContent=t<0.5?'Scanning composition':'Reading your signals';
        if(t<1)raf(step);else{line.style.transition='opacity .5s';line.style.opacity='0';glow.style.opacity='0';}
      }raf(step);
    },240);

    // V1 — the record builds
    LOG.forEach(function(r,i){T(function(){printLine(i);st.textContent='Reading · '+r[0];},LOGSTART+i*GAP);});
    T(function(){st.textContent='Calibration locked';},LOGSTART+LOG.length*GAP);
    T(function(){line.style.transition='';play();},TOTAL+1600);
  }

  var mv=document.getElementById('mv');
  if(mv.updateComplete){mv.updateComplete.then(function(){setTimeout(play,200);});}else{setTimeout(play,700);}
})();
</script>
</body>
</html>
