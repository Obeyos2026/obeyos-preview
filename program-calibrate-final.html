<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D12">
<title>OBEY OS · Calibration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/obeyos-cookie-storage.js"></script>
<script src="js/forge-data.js"></script>
<style>
:root{--bg:#0A0D12;--white:#F9FAFB;--muted:#8A93A6;--mid:#747E8C;--dim:#5C6679;--hair:rgba(255,255,255,.08);
  --lime:#C8FF00;--sig:var(--lime);--head:'Bebas Neue',sans-serif;--body:'Inter',sans-serif;--mono:'DM Mono',monospace;--ease:cubic-bezier(.23,1,.32,1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;height:100%;}
body{font-family:var(--body);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
.screen{position:relative;width:100%;max-width:430px;height:100dvh;min-height:760px;overflow:hidden;
  background:var(--bg);background-image:radial-gradient(rgba(200,255,0,.02) 1px,transparent 1px);background-size:28px 28px;}
.screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:9;background:radial-gradient(120% 55% at 50% 6%,rgba(200,255,0,.05),transparent 52%);}

.chead{position:absolute;top:5.5%;left:0;right:0;text-align:center;z-index:8;}
.chead .k{font-family:var(--mono);font-size:9px;letter-spacing:.32em;color:var(--sig);text-transform:uppercase;}
.chead .st{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-top:9px;height:12px;}
.pbar{width:126px;height:2px;border-radius:2px;background:rgba(255,255,255,.1);margin:13px auto 0;overflow:hidden;}
.pbar i{display:block;height:100%;width:0;background:var(--sig);box-shadow:0 0 8px var(--sig);}

/* construct zone — B5 CONTOUR BURN: the body materializes through its own burning
   silhouette (glow model masked to a thin band at the reveal edge). No scan line —
   nothing ever lights where there is no body. */
.zone{position:absolute;top:12%;left:0;right:0;height:34%;z-index:2;}
.hold{position:absolute;inset:0;}
.hold model-viewer{position:absolute;inset:0;width:100%;height:100%;background:transparent;--poster-color:transparent;outline:none;filter:brightness(.46) contrast(1.12) saturate(.72);}
.holdglow{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:3;mix-blend-mode:screen;transition:opacity .4s var(--ease);}
.holdglow model-viewer{position:absolute;inset:0;width:100%;height:100%;background:transparent;--poster-color:transparent;outline:none;
  filter:brightness(1.7) sepia(1) saturate(5.5) hue-rotate(48deg) brightness(1.5) drop-shadow(0 0 9px rgba(200,255,0,.9)) drop-shadow(0 0 24px rgba(200,255,0,.5));}
.fx{position:absolute;inset:0;width:100%;height:100%;z-index:6;pointer-events:none;} /* canvas is replaced — inset alone does not stretch it */

/* V5 — region pins (light up as the burn crosses each) */
.ro{position:absolute;z-index:7;font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--white);opacity:0;white-space:nowrap;transition:opacity .45s var(--ease);}
.ro.show{opacity:1;}
.ro .rl{color:var(--dim);}
.ro b{color:var(--sig);font-family:var(--head);font-size:15px;letter-spacing:.02em;margin-left:5px;}
.ro::before{content:"";position:absolute;top:50%;width:22px;height:1px;background:var(--sig);opacity:.5;}
.ro.l::before{right:100%;margin-right:7px;}
.ro.r::before{left:100%;margin-left:7px;}

/* the record */
.log{position:absolute;left:26px;right:26px;top:50%;z-index:7;font-family:var(--mono);}
.log .hdln{font-family:var(--mono);font-size:8px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;padding-bottom:10px;margin-bottom:4px;border-bottom:1px solid var(--hair);}
.ln{display:flex;align-items:baseline;font-size:11.5px;line-height:2.05;opacity:0;transform:translateX(-5px);}
.ln.in{opacity:1;transform:none;transition:opacity .3s var(--ease),transform .3s var(--ease);}
.ln .k{color:var(--mid);white-space:nowrap;}
.ln .lead{flex:1;overflow:hidden;color:var(--dim);letter-spacing:2px;margin:0 8px;height:1em;}
.ln .v{color:var(--dim);white-space:nowrap;transition:color .2s;}
.ln.done .k{color:var(--muted);}.ln.done .v{color:var(--white);}
.ln .v b{color:var(--sig);font-weight:500;}

.foot{position:absolute;left:0;right:0;bottom:5%;z-index:7;text-align:center;}
.foot .b{width:16px;height:16px;margin:0 auto 8px;filter:drop-shadow(0 0 6px rgba(200,255,0,.6));}
.foot .b svg{width:100%;height:100%;}
.foot .t{font-family:var(--mono);font-size:8px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase;}
@media(prefers-reduced-motion:reduce){.hold model-viewer{filter:brightness(.5) contrast(1.1) saturate(.72);}}
</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="zone" id="zone">
    <div class="hold" id="hold">
      <model-viewer id="mv" src="brand-assets/body-model/3d/obeyos-model-male-3d.glb" camera-orbit="0deg 90deg 100%" camera-target="0m 0m 0m" field-of-view="26deg" exposure="0.72" environment-image="neutral" shadow-intensity="0" disable-zoom disable-pan interaction-prompt="none" loading="eager"></model-viewer>
    </div>
    <div class="holdglow" id="holdglow">
      <model-viewer id="mv2" src="brand-assets/body-model/3d/obeyos-model-male-3d.glb" camera-orbit="0deg 90deg 100%" camera-target="0m 0m 0m" field-of-view="26deg" exposure="0.72" environment-image="neutral" shadow-intensity="0" disable-zoom disable-pan interaction-prompt="none" loading="eager"></model-viewer>
    </div>
    <canvas class="fx" id="fx"></canvas>
  </div>

  <div class="ro r" id="ro-muscle" data-y="22" style="left:64%;top:21%"><span class="rl">Muscle</span><b>42%</b></div>
  <div class="ro l" id="ro-fat" data-y="30" style="right:64%;top:29%"><span class="rl">Body fat</span><b>22%</b></div>
  <div class="ro r" id="ro-knee" data-y="38" style="left:62%;top:37%"><span class="rl">L-knee</span><b>Flagged</b></div>

  <div class="chead"><div class="k">ZEAL · Calibration</div><div class="st" id="st">Powering the engine</div><div class="pbar"><i id="pf"></i></div></div>

  <div class="log" id="log"><div class="hdln">Read · your signals</div></div>

  <div class="foot">
    <div class="b"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="#C8FF00"/></svg></div>
    <div class="t">ZEAL engine · do not close</div>
  </div>
</div>

<script>
(function(){
  var rm=matchMedia('(prefers-reduced-motion: reduce)').matches;

  var screen=document.getElementById('screen'),zone=document.getElementById('zone'),hold=document.getElementById('hold'),
      holdglow=document.getElementById('holdglow'),fx=document.getElementById('fx'),
      st=document.getElementById('st'),pf=document.getElementById('pf'),log=document.getElementById('log');

  /* ---- DATA — ForgeData (Supabase profile when authed, mock/demo otherwise) ---- */
  var LOG=[];
  function applyData(d){
    document.querySelectorAll('#zone model-viewer').forEach(function(m){m.src='brand-assets/body-model/3d/'+d.glb;});
    LOG=[['read body composition',Math.round(d.bodyFatPct)+'% <b>BF</b>'],
      ['estimate skeletal muscle',Math.round(d.smmPct)+'% <b>SMM</b>'],
      ['pull overnight recovery',d.hrv+' · '+d.sleepH+'H']]
      .concat(d.injuryLabel?[['map injury history','<b>'+d.injuryLabel.toUpperCase()+'</b>']]:[['map injury history','<b>CLEAR</b>']])
      .concat([['match program library','31 → <b>1</b>'],
      ['lock training tier','TIER <b>'+d.tierNum+'</b>']]);
    log.querySelectorAll('.ln').forEach(function(n){n.remove();});
    LOG.forEach(function(r,i){var el=document.createElement('div');el.className='ln';el.id='ln'+i;
      el.innerHTML='<span class="k">'+r[0]+'</span><span class="lead"></span><span class="v" id="lv'+i+'"></span>';log.appendChild(el);});
    document.querySelector('#ro-muscle b').textContent=Math.round(d.smmPct)+'%';
    document.querySelector('#ro-fat b').textContent=Math.round(d.bodyFatPct)+'%';
    var knee=document.getElementById('ro-knee');
    if(d.injuryLabel){knee.querySelector('.rl').textContent=d.injuryLabel;knee.querySelector('b').textContent='Flagged';knee.style.display='';}
    else{knee.style.display='none';}
  }
  applyData(ForgeData.DEFAULTS);
  ForgeData.load().then(applyData);

  var timers=[];
  function T(f,m){var id=setTimeout(f,m);timers.push(id);return id;}
  function raf(f){var id=requestAnimationFrame(f);timers.push(id);return id;}
  function clr(){timers.forEach(function(t){clearTimeout(t);cancelAnimationFrame(t);});timers=[];}
  function printLine(i){var ln=document.getElementById('ln'+i),lead=ln.querySelector('.lead'),v=document.getElementById('lv'+i);
    ln.classList.add('in');lead.textContent=new Array(26).join('.');T(function(){v.innerHTML=LOG[i][1];ln.classList.add('done');},240);}

  /* ---- reveal driver (ONE yPx drives mask + glow band + embers — perfectly synced) ---- */
  function setReveal(fracFromTopPx){
    var h=zone.clientHeight, revPct=h?Math.max(0,Math.min(100,(fracFromTopPx/h)*100)):0;
    var a=Math.max(0,revPct-5), b=Math.min(100,revPct+5);
    var mask='linear-gradient(180deg,#000 '+a+'%,rgba(0,0,0,0) '+b+'%)';
    hold.style.webkitMaskImage=mask;hold.style.maskImage=mask;
  }
  function setGlowBand(px){
    // the lime model shows only in a thin band at the edge → the silhouette burns
    var h=zone.clientHeight, p=h?Math.max(0,Math.min(100,(px/h)*100)):0;
    var mask='linear-gradient(180deg,transparent '+Math.max(0,p-6)+'%,#000 '+Math.max(0,p-1.2)+'%,#000 '+Math.min(100,p+1.6)+'%,transparent '+Math.min(100,p+4.5)+'%)';
    holdglow.style.webkitMaskImage=mask;holdglow.style.maskImage=mask;
  }

  /* approximate body half-width (fraction of zone width) per zone-y fraction — A-pose male.
     embers only ever spawn INSIDE this profile, so the burn stays on the body. */
  var PROF=[[0,0],[.04,0],[.06,.03],[.10,.055],[.16,.045],[.19,.05],[.23,.14],[.32,.20],[.42,.27],[.47,.30],[.50,.12],[.56,.09],[.68,.08],[.85,.065],[1,.075]];
  function bodyHalfW(f){
    for(var i=1;i<PROF.length;i++){
      if(f<=PROF[i][0]){var a=PROF[i-1],b=PROF[i],s=(f-a[0])/(b[0]-a[0]||1);return a[1]+(b[1]-a[1])*s;}
    }
    return PROF[PROF.length-1][1];
  }

  /* ---- embers (P0 · NONE — founder pick 2026-07-23; raise EMBER_RATE to bring them back) ---- */
  var EMBER_RATE=0, COLS=['210,255,60','200,255,0','240,255,190'];
  var ctx=fx.getContext('2d'),FW=0,FH=0;
  function sizeFx(){var d=window.devicePixelRatio||1,r=fx.getBoundingClientRect();fx.width=r.width*d;fx.height=r.height*d;ctx.setTransform(d,0,0,d,0,0);FW=r.width;FH=r.height;}
  sizeFx();addEventListener('resize',sizeFx);
  var sparks=[];
  function spawnEmbers(edgeY,n,x0,x1){
    if(x1-x0<2)return;
    for(var i=0;i<n;i++){
      var cling=Math.random()<.7;
      sparks.push({x:x0+Math.random()*(x1-x0),y:edgeY+(Math.random()-.5)*3,
        vx:(Math.random()-.5)*(cling?.25:.5), vy:cling?-(.06+Math.random()*.2):-(.25+Math.random()*.95),
        life:1, decay:cling?(.03+Math.random()*.03):(.008+Math.random()*.014), sz:cling?(.7+Math.random()*1.1):(.8+Math.random()*1.7),
        col:COLS[Math.floor(Math.random()*COLS.length)]});
    }
  }
  function drawSparks(){
    sparks=sparks.filter(function(s){
      s.x+=s.vx;s.y+=s.vy;s.vy*=.995;s.life-=s.decay;
      if(s.life<=0)return false;
      ctx.globalAlpha=Math.min(1,s.life*1.2)*.85;
      ctx.beginPath();ctx.arc(s.x,s.y,s.sz*Math.max(.3,s.life),0,Math.PI*2);
      ctx.fillStyle='rgba('+s.col+',1)';ctx.shadowColor='rgb('+s.col+')';ctx.shadowBlur=6;
      ctx.fill();ctx.shadowBlur=0;
      return true;
    });
    ctx.globalAlpha=1;
  }

  var PINS=[document.getElementById('ro-muscle'),document.getElementById('ro-fat'),document.getElementById('ro-knee')];

  function play(){
    clr();
    LOG.forEach(function(r,i){var ln=document.getElementById('ln'+i);ln.className='ln';document.getElementById('lv'+i).innerHTML='';ln.querySelector('.lead').textContent='';});
    PINS.forEach(function(p){p.classList.remove('show');});
    sparks=[];ctx.clearRect(0,0,FW,FH);
    holdglow.style.transition='';holdglow.style.opacity='0';
    st.textContent='Powering the engine';pf.style.transition='none';pf.style.width='0';
    setReveal(0);

    var SCAN=5600, LOGSTART=2100, GAP=920, TOTAL=Math.max(SCAN+600, LOGSTART+LOG.length*GAP+400);
    T(function(){pf.style.transition='width '+(TOTAL/1000)+'s linear';pf.style.width='100%';},60);

    // ONE animation drives the burn edge AND the body/data reveal — perfectly synced
    T(function(){
      setGlowBand(0);holdglow.style.opacity='1';
      var start=null, zoneTop=zone.getBoundingClientRect().top-screen.getBoundingClientRect().top;
      function step(ts){
        if(!start)start=ts;var t=Math.min(1,(ts-start)/SCAN);
        var e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; // ease-in-out — cinematic
        var yPx=zone.clientHeight*e;              // reveal boundary in zone px
        setReveal(yPx);setGlowBand(yPx);
        ctx.clearRect(0,0,FW,FH);
        if(t<1){
          var n=Math.floor(EMBER_RATE)+(Math.random()<EMBER_RATE%1?1:0);
          var f=yPx/zone.clientHeight, hw=bodyHalfW(f)*FW, cx=FW*.5;
          n=Math.max(0,Math.round(n*Math.min(1,hw/(FW*.18))));
          spawnEmbers(yPx,n,cx-hw,cx+hw);
        }
        drawSparks();
        // V5 pins light up as the burn crosses each region
        var boundaryPct=((zoneTop+yPx)/screen.clientHeight)*100;
        PINS.forEach(function(p){if(boundaryPct> +p.dataset.y)p.classList.add('show');});
        if(t<1)st.textContent = t<0.5?'Scanning upper body':'Scanning lower body';
        if(t<1||sparks.length){
          if(t>=1){ setReveal(zone.clientHeight+8);
            if(holdglow.style.opacity!=='0'){holdglow.style.transition='opacity .7s';holdglow.style.opacity='0';st.textContent='Reading your signals';} }
          raf(step);
        }
        else{ setReveal(zone.clientHeight+8); ctx.clearRect(0,0,FW,FH);
          if(holdglow.style.opacity!=='0'){holdglow.style.transition='opacity .7s';holdglow.style.opacity='0';}
          st.textContent='Reading your signals'; }
      }
      raf(step);
    },240);

    // the record builds
    LOG.forEach(function(r,i){T(function(){printLine(i);},LOGSTART+i*GAP);});
    T(function(){st.textContent='Calibration locked';},LOGSTART+LOG.length*GAP);
    T(function(){play();},TOTAL+1600);
  }

  /* ---- ONE rotation clock drives BOTH models — they can never desync ---- */
  var mv=document.getElementById('mv'),mv2=document.getElementById('mv2');
  (function spin(){
    var deg=((performance.now()/1000)*10)%360;
    var orbit=deg.toFixed(2)+'deg 90deg 100%';
    mv.cameraOrbit=orbit;mv2.cameraOrbit=orbit;
    if(!rm)requestAnimationFrame(spin);
  })();

  function boot(){
    if(rm){ setReveal(zone.clientHeight+8);
      PINS.forEach(function(p){p.classList.add('show');});
      LOG.forEach(function(r,i){var ln=document.getElementById('ln'+i);ln.classList.add('in');document.getElementById('lv'+i).innerHTML=r[1];ln.classList.add('done');ln.querySelector('.lead').textContent=new Array(26).join('.');});
      st.textContent='Calibration locked';pf.style.width='100%';return; }
    play();
  }
  Promise.all([mv.updateComplete||Promise.resolve(),mv2.updateComplete||Promise.resolve()])
    .then(function(){setTimeout(boot,250);});
})();
</script>
</body>
</html>
