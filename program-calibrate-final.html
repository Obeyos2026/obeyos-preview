<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D12">
<title>OBEY OS · Calibration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
@property --p{syntax:'<number>';inherits:false;initial-value:0;}
:root{--bg:#0A0D12;--white:#F9FAFB;--muted:#8A93A6;--mid:#747E8C;--dim:#5C6679;--hair:rgba(255,255,255,.08);
  --lime:#C8FF00;--mint:#00E5A0;--sig:var(--lime);--panel:rgba(255,255,255,.026);
  --head:'Bebas Neue',sans-serif;--body:'Inter',sans-serif;--mono:'DM Mono',monospace;--ease:cubic-bezier(.23,1,.32,1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#000;height:100%;}
body{font-family:var(--body);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
.screen{position:relative;width:100%;max-width:430px;height:100dvh;min-height:760px;overflow:hidden;
  background:var(--bg);background-image:radial-gradient(rgba(200,255,0,.022) 1px,transparent 1px);background-size:28px 28px;}
.screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:9;background:radial-gradient(120% 55% at 50% 6%,rgba(200,255,0,.05),transparent 52%);}

.chead{position:absolute;top:4.5%;left:0;right:0;text-align:center;z-index:8;}
.chead .k{font-family:var(--mono);font-size:9px;letter-spacing:.32em;color:var(--sig);text-transform:uppercase;}
.chead .st{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-top:9px;height:12px;}
.pbar{width:126px;height:2px;border-radius:2px;background:rgba(255,255,255,.1);margin:13px auto 0;overflow:hidden;}
.pbar i{display:block;height:100%;width:0;background:var(--sig);box-shadow:0 0 8px var(--sig);}

/* body (hero, upper) */
model-viewer{position:absolute;top:9.5%;left:0;right:0;height:27%;background:transparent;--poster-color:transparent;outline:none;
  filter:brightness(.46) contrast(1.12) saturate(.72);z-index:2;}
.scanglow{position:absolute;left:0;right:0;height:60px;background:linear-gradient(180deg,rgba(200,255,0,.13),transparent);z-index:3;pointer-events:none;opacity:0;}
.scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--sig) 22%,var(--sig) 78%,transparent);box-shadow:0 0 18px 3px rgba(200,255,0,.5);z-index:4;pointer-events:none;opacity:0;}
.lift{position:absolute;left:12%;right:12%;height:20px;z-index:4;pointer-events:none;overflow:hidden;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:rgba(200,255,0,.5);text-align:center;white-space:nowrap;opacity:0;}

/* profile grid */
.grid{position:absolute;left:18px;right:18px;top:39%;bottom:4%;z-index:6;display:grid;grid-template-columns:1fr 1fr 1fr;grid-auto-rows:1fr;gap:8px;}
.cell{position:relative;border:1px solid var(--hair);background:var(--panel);border-radius:14px;padding:11px 11px 10px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;
  opacity:0;transform:translateY(8px) scale(.97);}
.cell.in{opacity:1;transform:none;transition:opacity .5s var(--ease),transform .5s var(--ease);}
.cell .cl{font-family:var(--mono);font-size:7.5px;letter-spacing:.13em;color:var(--dim);text-transform:uppercase;}
.cell .cv{font-family:var(--head);font-size:22px;line-height:.85;color:var(--white);letter-spacing:.02em;}
.cell .cv em{font-style:normal;color:var(--sig);}
.cell .cu{font-family:var(--mono);font-size:8px;color:var(--mid);letter-spacing:.06em;text-transform:uppercase;margin-left:3px;}
.cell .viz{display:flex;align-items:flex-end;min-height:30px;}
.cell svg.ic{width:22px;height:22px;stroke:var(--sig);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

/* ring gauge */
.ring{--p:0;width:52px;height:52px;border-radius:50%;background:conic-gradient(var(--sig) calc(var(--p)*3.6deg),rgba(255,255,255,.09) 0);position:relative;transition:--p 1.1s var(--ease);}
.ring::after{content:"";position:absolute;inset:5px;border-radius:50%;background:#0E1218;}
.ring b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:16px;color:var(--white);z-index:2;}
/* horizontal bar gauge */
.hb{position:relative;width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.09);margin-top:4px;}
.hb i{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:3px;background:linear-gradient(90deg,color-mix(in srgb,var(--sig) 55%,transparent),var(--sig));box-shadow:0 0 8px rgba(200,255,0,.45);transition:width 1.1s var(--ease);}
/* level bars */
.lv{display:flex;align-items:flex-end;gap:4px;height:26px;width:100%;}
.lv i{flex:1;border-radius:2px 2px 0 0;background:rgba(255,255,255,.1);}
.lv i:nth-child(1){height:34%}.lv i:nth-child(2){height:52%}.lv i:nth-child(3){height:70%}.lv i:nth-child(4){height:86%}.lv i:nth-child(5){height:100%}
.lv i.on{background:var(--sig);box-shadow:0 0 6px rgba(200,255,0,.45);}
/* tier ladder */
.ld{display:flex;align-items:flex-end;gap:4px;height:26px;width:100%;}
.ld i{flex:1;border-radius:2px 2px 0 0;background:rgba(255,255,255,.1);}
.ld i:nth-child(1){height:38%}.ld i:nth-child(2){height:60%}.ld i:nth-child(3){height:80%}.ld i:nth-child(4){height:100%}
.ld i.on{background:var(--sig);box-shadow:0 0 8px rgba(200,255,0,.5);}
/* sparkline */
.spk{width:100%;height:26px;}
.spk polyline{fill:none;stroke:var(--sig);stroke-width:1.6;filter:drop-shadow(0 0 3px rgba(200,255,0,.5));stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>
<div class="screen" id="screen">
  <model-viewer id="mv" src="brand-assets/body-model/3d/obeyos-model-male-3d.glb" auto-rotate auto-rotate-delay="0" rotation-per-second="18deg" camera-orbit="0deg 90deg 100%" camera-target="0m 0m 0m" field-of-view="24deg" exposure="0.72" environment-image="neutral" shadow-intensity="0" disable-zoom disable-pan interaction-prompt="none" loading="eager"></model-viewer>
  <div class="scanglow" id="glow"></div>
  <div class="scanline" id="line"></div>
  <div class="lift" id="lift"></div>

  <div class="chead"><div class="k">ZEAL · Calibration</div><div class="st" id="st">Powering the engine</div><div class="pbar"><i id="pf"></i></div></div>

  <div class="grid" id="grid"></div>
</div>

<script>
(function(){
  var rm=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var screen=document.getElementById('screen'),line=document.getElementById('line'),glow=document.getElementById('glow'),lift=document.getElementById('lift'),st=document.getElementById('st'),pf=document.getElementById('pf'),grid=document.getElementById('grid');
  var GL='0123456789ABCDEF·%.HKRVSLPMGZ';
  function noise(n){var s='';for(var i=0;i<n;i++)s+=GL[Math.floor(Math.random()*GL.length)];return s;}
  var IC={male:'<path d="M12 8a3.2 3.2 0 100-6.4A3.2 3.2 0 0012 8zM6 22v-1.5a6 6 0 0112 0V22"/>',
    goal:'<path d="M4 7l8 8 8-8M4 17l8-8 8 8"/>',
    age:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'};

  // the full profile ZEAL read — varied components
  var CELLS=[
    {cl:'Age',    t:'num',  v:'32', u:'yrs', ic:'age'},
    {cl:'Sex',    t:'icon', v:'MALE', ic:'male'},
    {cl:'Goal',   t:'icon', v:'RECOMP', ic:'goal'},
    {cl:'Body fat', t:'bar', v:'22', u:'%', p:55},
    {cl:'Muscle', t:'ring', v:42, u:'% smm', p:42},
    {cl:'Activity', t:'lv', v:'ACTIVE', on:4},
    {cl:'Recovery', t:'ring', v:72, u:'%', p:72},
    {cl:'HRV',    t:'spk',  v:'68', u:'ms'},
    {cl:'Tier',   t:'ld',   v:'TIER 2', on:2}
  ];
  function vizHTML(c){
    if(c.t==='num')  return '<div class="viz"><svg class="ic" viewBox="0 0 24 24">'+IC[c.ic]+'</svg></div><div class="cv" id="V">'+ '<em>'+c.v+'</em><span class="cu">'+c.u+'</span></div>';
    if(c.t==='icon') return '<div class="viz"><svg class="ic" viewBox="0 0 24 24">'+IC[c.ic]+'</svg></div><div class="cv" style="font-size:16px">'+c.v+'</div>';
    if(c.t==='bar')  return '<div class="viz" style="align-items:center"><div class="hb"><i></i></div></div><div class="cv"><em>'+c.v+'</em><span class="cu">'+c.u+'</span></div>';
    if(c.t==='ring') return '<div class="viz" style="justify-content:center;align-items:center;flex:1"><div class="ring"><b>'+c.v+'</b></div></div>';
    if(c.t==='lv')   return '<div class="viz"><div class="lv"><i></i><i></i><i></i><i></i><i></i></div></div><div class="cv" style="font-size:15px">'+c.v+'</div>';
    if(c.t==='ld')   return '<div class="viz"><div class="ld"><i></i><i></i><i></i><i></i></div></div><div class="cv" style="font-size:15px"><em>'+c.v+'</em></div>';
    if(c.t==='spk')  return '<div class="viz"><svg class="spk" viewBox="0 0 100 26" preserveAspectRatio="none"><polyline points="0,18 12,15 22,20 34,9 46,17 58,7 70,14 82,6 100,12"/></svg></div><div class="cv"><em>'+c.v+'</em><span class="cu">'+c.u+'</span></div>';
    return '';
  }
  grid.innerHTML=CELLS.map(function(c,i){return '<div class="cell" id="cell'+i+'"><div class="cl">'+c.cl+'</div>'+vizHTML(c)+'</div>';}).join('');
  // ring center values need the numeric with unit under? ring shows number inside; add label handled by cl.

  var timers=[];
  function T(f,m){var id=setTimeout(f,m);timers.push(id);return id;}
  function raf(f){var id=requestAnimationFrame(f);timers.push(id);return id;}
  function clr(){timers.forEach(function(t){clearTimeout(t);cancelAnimationFrame(t);});timers=[];}

  function readCell(i){
    var c=CELLS[i],el=document.getElementById('cell'+i);el.classList.add('in');
    st.textContent='Reading · '+c.cl;
    if(c.t==='ring'){var r=el.querySelector('.ring');T(function(){r.style.setProperty('--p',c.p);},60);}
    if(c.t==='bar'){var b=el.querySelector('.hb i');T(function(){b.style.width=c.p+'%';},60);}
    if(c.t==='lv'){var bars=el.querySelectorAll('.lv i');bars.forEach(function(x,k){T(function(){if(k<c.on)x.classList.add('on');},120+k*80);});}
    if(c.t==='ld'){var lds=el.querySelectorAll('.ld i');T(function(){lds[c.on-1].classList.add('on');},120);}
  }

  function play(){
    clr();
    CELLS.forEach(function(c,i){var el=document.getElementById('cell'+i);el.classList.remove('in');
      var r=el.querySelector('.ring');if(r)r.style.setProperty('--p',0);
      var b=el.querySelector('.hb i');if(b)b.style.width='0';
      el.querySelectorAll('.lv i,.ld i').forEach(function(x){x.classList.remove('on');});});
    line.style.opacity='0';glow.style.opacity='0';lift.style.opacity='0';
    st.textContent='Powering the engine';pf.style.transition='none';pf.style.width='0';

    var mv=document.getElementById('mv'),box=mv.getBoundingClientRect(),sc=screen.getBoundingClientRect();
    var top=box.top-sc.top,bot=box.bottom-sc.top,SCAN=2600;
    var CELLSTART=1500,GAP=430,TOTAL=CELLSTART+CELLS.length*GAP+400;
    pf.style.width='0';T(function(){pf.style.transition='width '+(TOTAL/1000)+'s linear';pf.style.width='100%';},60);

    // scan the body first (composition)
    T(function(){
      line.style.opacity='1';glow.style.opacity='1';lift.style.opacity='1';
      var start=null;
      function step(ts){if(!start)start=ts;var t=Math.min(1,(ts-start)/SCAN);
        var y=top+(bot-top)*t;line.style.top=y+'px';glow.style.top=(y-56)+'px';lift.style.top=(y-10)+'px';lift.textContent=noise(16);
        st.textContent=t<0.5?'Scanning composition':'Scanning composition';
        if(t<1)raf(step);else{line.style.transition='opacity .5s';line.style.opacity='0';glow.style.opacity='0';lift.style.opacity='0';}
      }raf(step);
    },240);

    // then the profile assembles, cell by cell
    CELLS.forEach(function(c,i){T(function(){readCell(i);},CELLSTART+i*GAP);});
    T(function(){st.textContent='Profile locked';},CELLSTART+CELLS.length*GAP);
    T(function(){line.style.transition='';play();},TOTAL+1600);
  }

  var mv=document.getElementById('mv');
  if(mv.updateComplete){mv.updateComplete.then(function(){setTimeout(play,200);});}else{setTimeout(play,700);}
})();
</script>
</body>
</html>
