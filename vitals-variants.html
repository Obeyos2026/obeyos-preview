<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D12">
<title>OBEY OS · Vitals section — 5 variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0D12; --white:#F9FAFB; --muted:#8A93A6; --mid:#747E8C; --dim:#5C6679; --hair:rgba(255,255,255,.08);
  --lime:#C8FF00; --mint:#00E5A0; --amber:#F59E0B; --red:#EF4444; --cyan:#00D4FF; --good:#22C55E;
  --panel:rgba(255,255,255,.022); --glass:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.018));
  --head:'Bebas Neue',sans-serif; --body:'Inter',-apple-system,sans-serif; --mono:'DM Mono',monospace;
  --ease:cubic-bezier(.23,1,.32,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#05070a;height:100%;}
body{font-family:var(--body);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
.screen{width:100%;max-width:430px;min-height:100dvh;position:relative;background:var(--bg);
  background-image:radial-gradient(rgba(200,255,0,.026) 1px, transparent 1px),radial-gradient(120% 50% at 50% -6%, rgba(0,229,160,.06), transparent 60%);
  background-size:28px 28px,100% 100%;padding:16px 20px 60px;}
.vtoggle{position:sticky;top:0;z-index:9;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:6px 0 14px;margin:0 -20px 2px;background:linear-gradient(#0A0D12 74%,transparent);}
.vtoggle button{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:7px 12px;border-radius:14px;border:1px solid var(--hair);background:var(--panel);color:var(--muted);cursor:pointer;}
.vtoggle button.on{background:var(--lime);color:#0A0D12;border-color:var(--lime);}
.sec-lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;margin:8px 0 14px;display:flex;justify-content:space-between;}
.sec-lbl a{color:var(--mid);text-decoration:none;}
.mount{min-height:400px;}

/* icon helper */
.ic svg{fill:none;stroke:var(--vc);stroke-width:1.7;}

/* ============ A · ROWS (instrument list, no cards) ============ */
.rows .vrow{padding:14px 2px;border-top:1px solid var(--hair);}
.rows .vrow:first-child{border-top:none;}
.rows .top{display:flex;align-items:center;gap:9px;}
.rows .vi svg{width:14px;height:14px;stroke:var(--vc);}
.rows .vnm{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--mid);text-transform:uppercase;flex:1;}
.rows .vval{font-family:var(--head);font-size:24px;color:var(--white);line-height:.8;}
.rows .vval small{font-family:var(--mono);font-size:8px;color:var(--dim);margin-left:2px;}
.rows .vst{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--vc);display:flex;align-items:center;gap:5px;margin-left:12px;}
.rows .vst i{width:7px;height:7px;border-radius:50%;background:var(--vc);box-shadow:0 0 6px var(--vc);}
.rows .bar{position:relative;height:3px;border-radius:2px;background:rgba(255,255,255,.08);margin-top:11px;}
.rows .bar .mk{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;background:#0A0D12;border:2px solid var(--vc);box-shadow:0 0 7px var(--vc);transform:translate(-50%,-50%);}

/* ============ B · RAIL (single compact strip) ============ */
.rail{display:grid;grid-template-columns:1fr auto 1fr auto 1fr auto 1fr;align-items:center;padding:16px 4px;border-radius:16px;background:var(--glass);border:1px solid rgba(255,255,255,.09);box-shadow:inset 0 1px 0 rgba(255,255,255,.06);}
.rail .ri{display:flex;flex-direction:column;align-items:center;gap:5px;}
.rail .ri svg{width:14px;height:14px;stroke:var(--vc);}
.rail .rv{font-family:var(--head);font-size:23px;color:var(--white);line-height:.85;}
.rail .rv small{font-family:var(--mono);font-size:7px;color:var(--dim);}
.rail .rn{font-family:var(--mono);font-size:7px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;}
.rail .rd{width:6px;height:6px;border-radius:50%;background:var(--vc);box-shadow:0 0 6px var(--vc);margin-top:2px;}
.rail .rsep{width:1px;height:46px;background:linear-gradient(transparent,var(--hair) 20%,var(--hair) 80%,transparent);}

/* ============ C · DIALS (mini radial gauges) ============ */
.dials{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.dial{display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 4px;}
.dial .ring{position:relative;width:60px;height:60px;}
.dial .ring svg{width:100%;height:100%;overflow:visible;transform:rotate(135deg);}
.dial .ring .t{fill:none;stroke:rgba(255,255,255,.08);stroke-width:5;stroke-linecap:round;stroke-dasharray:106 200;}
.dial .ring .a{fill:none;stroke:var(--vc);stroke-width:5;stroke-linecap:round;stroke-dasharray:106 200;stroke-dashoffset:106;filter:drop-shadow(0 0 4px color-mix(in srgb,var(--vc) 55%,transparent));transition:stroke-dashoffset 1.1s var(--ease) .3s;}
.play .dial .ring .a{stroke-dashoffset:var(--o,60);}
.dial .ring .v{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.dial .ring .v b{font-family:var(--head);font-weight:400;font-size:20px;color:var(--white);line-height:.8;}
.dial .ring .v small{font-family:var(--mono);font-size:6px;color:var(--dim);letter-spacing:.04em;margin-top:1px;}
.dial .nm{font-family:var(--mono);font-size:7.5px;letter-spacing:.06em;color:var(--mid);text-transform:uppercase;}
.dial .st{font-family:var(--mono);font-size:6.5px;letter-spacing:.05em;color:var(--vc);text-transform:uppercase;}

/* ============ D · SPARKS (sparkline rows) ============ */
.sparks .srow{display:flex;align-items:center;gap:12px;padding:14px 2px;border-top:1px solid var(--hair);}
.sparks .srow:first-child{border-top:none;}
.sparks .sl{display:flex;flex-direction:column;gap:4px;min-width:78px;}
.sparks .snm{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--mid);text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.sparks .snm svg{width:12px;height:12px;stroke:var(--vc);}
.sparks .sval{font-family:var(--head);font-size:22px;color:var(--white);line-height:.8;}
.sparks .sval small{font-family:var(--mono);font-size:7px;color:var(--dim);}
.sparks .spk{flex:1;height:34px;}
.sparks .spk .ln{fill:none;stroke:var(--vc);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 4px color-mix(in srgb,var(--vc) 40%,transparent));}
.sparks .spk .pt{fill:var(--vc);}
.sparks .sst{font-family:var(--mono);font-size:7.5px;letter-spacing:.05em;color:var(--vc);text-transform:uppercase;text-align:right;min-width:48px;}

/* ============ E · BARS (horizontal range meters) ============ */
.bars .brow{padding:15px 2px;border-top:1px solid var(--hair);}
.bars .brow:first-child{border-top:none;}
.bars .bh{display:flex;align-items:baseline;gap:9px;margin-bottom:11px;}
.bars .bi svg{width:13px;height:13px;stroke:var(--vc);}
.bars .bnm{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--mid);text-transform:uppercase;flex:1;}
.bars .bval{font-family:var(--head);font-size:24px;color:var(--white);line-height:.8;}
.bars .bval small{font-family:var(--mono);font-size:8px;color:var(--dim);}
.bars .bst{font-family:var(--mono);font-size:8px;letter-spacing:.05em;color:var(--vc);text-transform:uppercase;}
.bars .track{position:relative;height:7px;border-radius:5px;background:linear-gradient(90deg,color-mix(in srgb,var(--amber) 38%,transparent),color-mix(in srgb,var(--good) 62%,transparent) 34%,color-mix(in srgb,var(--good) 62%,transparent) 66%,color-mix(in srgb,var(--amber) 38%,transparent));box-shadow:inset 0 1px 2px rgba(0,0,0,.4);}
.bars .track .band{position:absolute;top:0;bottom:0;border-radius:5px;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--good) 30%,transparent),transparent);}
.bars .track .mk{position:absolute;top:50%;width:15px;height:15px;border-radius:50%;background:#0A0D12;border:2.5px solid var(--vc);box-shadow:0 0 12px var(--vc);transform:translate(-50%,-50%);}
</style>
</head>
<body>
<div class="screen play" id="screen">
  <div class="vtoggle">
    <button data-v="rows" class="on">Rows</button>
    <button data-v="rail">Rail</button>
    <button data-v="dials">Dials</button>
    <button data-v="sparks">Sparks</button>
    <button data-v="bars">Bars</button>
  </div>
  <div class="sec-lbl"><span>Vitals · what ZEAL read</span><a href="#">All →</a></div>
  <div class="mount" id="mount"></div>
</div>

<script>
(function(){
  var G={ ecg:'M3 12h4l2 6 4-14 2 8h6', drop:'M12 3c4 5 6 8 6 11a6 6 0 01-12 0c0-3 2-6 6-11z',
    thermo:'M14 14.8V5a2 2 0 10-4 0v9.8a4 4 0 104 0z', lungs:'M6 8a4 4 0 018 0c0 3-4 3-4 6M4 15h16M4 19h16' };
  var V=[
    {ic:'ecg', nm:'RHR', v:'55', u:'BPM', st:'Normal', c:'var(--good)', pos:38, bl:28, br:26, o:66, sp:[57,56,58,55,54,56,55]},
    {ic:'drop', nm:'SpO₂', v:'96', u:'%', st:'Normal', c:'var(--good)', pos:82, bl:50, br:5, o:30, sp:[95,96,95,97,96,96,96]},
    {ic:'thermo', nm:'Skin temp', v:'36.5', u:'°C', st:'Normal', c:'var(--good)', pos:50, bl:33, br:33, o:56, sp:[36.4,36.5,36.4,36.6,36.5,36.4,36.5]},
    {ic:'lungs', nm:'Resp rate', v:'13', u:'RPM', st:'Slightly low', c:'var(--amber)', pos:34, bl:33, br:33, o:72, sp:[14,15,14,13,14,13,13]}
  ];
  function icon(k){return '<svg viewBox="0 0 24 24"><path d="'+G[k]+'"/></svg>';}
  function spark(vals,c){
    var W=120,H=34,PL=2,PR=2,PT=6,PB=6,mn=Math.min.apply(0,vals),mx=Math.max.apply(0,vals);if(mx===mn)mx=mn+1;
    var pts=vals.map(function(v,i){return [PL+(W-PL-PR)*(i/(vals.length-1)),(H-PB)-(H-PT-PB)*((v-mn)/(mx-mn))];});
    var dd='M'+pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' L');
    var last=pts[pts.length-1];
    return '<svg class="spk" viewBox="0 0 120 34" preserveAspectRatio="none"><path class="ln" d="'+dd+'"/><circle class="pt" cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="2.6"/></svg>';
  }
  var R={
    rows:function(){ return '<div class="rows">'+V.map(function(x){return '<div class="vrow" style="--vc:'+x.c+'">'+
      '<div class="top"><span class="vi">'+icon(x.ic)+'</span><span class="vnm">'+x.nm+'</span><span class="vval">'+x.v+'<small>'+x.u+'</small></span><span class="vst"><i></i>'+x.st+'</span></div>'+
      '<div class="bar"><span class="mk" style="left:'+x.pos+'%"></span></div></div>';}).join('')+'</div>'; },
    rail:function(){ return '<div class="rail">'+V.map(function(x,i){return (i?'<div class="rsep"></div>':'')+
      '<div class="ri" style="--vc:'+x.c+'">'+icon(x.ic).replace('<svg','<svg style="margin-bottom:2px"')+'<span class="rv">'+x.v+'<small>'+x.u+'</small></span><span class="rn">'+x.nm+'</span><span class="rd"></span></div>';}).join('')+'</div>'; },
    dials:function(){ return '<div class="dials">'+V.map(function(x){return '<div class="dial" style="--vc:'+x.c+'"><div class="ring" style="--o:'+x.o+'"><svg viewBox="0 0 60 60"><circle class="t" cx="30" cy="30" r="24"/><circle class="a" cx="30" cy="30" r="24"/></svg><div class="v"><b>'+x.v+'</b><small>'+x.u+'</small></div></div><div class="nm">'+x.nm+'</div><div class="st">'+x.st+'</div></div>';}).join('')+'</div>'; },
    sparks:function(){ return '<div class="sparks">'+V.map(function(x){return '<div class="srow" style="--vc:'+x.c+'"><div class="sl"><span class="snm">'+icon(x.ic)+x.nm+'</span><span class="sval">'+x.v+'<small>'+x.u+'</small></span></div>'+spark(x.sp,x.c)+'<span class="sst">'+x.st+'</span></div>';}).join('')+'</div>'; },
    bars:function(){ return '<div class="bars">'+V.map(function(x){return '<div class="brow" style="--vc:'+x.c+'"><div class="bh"><span class="bi">'+icon(x.ic)+'</span><span class="bnm">'+x.nm+'</span><span class="bval">'+x.v+'<small>'+x.u+'</small></span></div><div class="track"><span class="band" style="left:'+x.bl+'%;right:'+x.br+'%"></span><span class="mk" style="left:'+x.pos+'%"></span></div><div style="text-align:right;margin-top:8px"><span class="bst">'+x.st+'</span></div></div>';}).join('')+'</div>'; }
  };
  var mount=document.getElementById('mount');
  function show(m){ mount.innerHTML=R[m](); }
  document.querySelectorAll('.vtoggle button').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('.vtoggle button').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on'); show(b.dataset.v);
      // retrigger dial fill
      var s=document.getElementById('screen'); s.classList.remove('play'); void s.offsetWidth; s.classList.add('play');
    });
  });
  show('rows');
})();
</script>
</body>
</html>
