<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0D12">
<title>OBEY OS · Building your program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0D12;--white:#F9FAFB;--muted:#8A93A6;--mid:#747E8C;--dim:#5C6679;--hair:rgba(255,255,255,.08);
  --lime:#C8FF00;--mint:#00E5A0;--amber:#F59E0B;--cyan:#00D4FF;--sig:var(--lime);
  --panel:rgba(255,255,255,.022);--head:'Bebas Neue',sans-serif;--body:'Inter',sans-serif;--mono:'DM Mono',monospace;--ease:cubic-bezier(.23,1,.32,1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#05070a;height:100%;}
body{font-family:var(--body);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
.wrap{width:100%;max-width:430px;position:relative;background:var(--bg);}

/* ===== BEAT 1 · RECAP (page scrolls) ===== */
.recap{min-height:100dvh;background-image:radial-gradient(rgba(200,255,0,.026) 1px,transparent 1px),radial-gradient(120% 40% at 50% -4%,rgba(200,255,0,.05),transparent 60%);background-size:28px 28px,100% 100%;padding:22px 20px 40px;transition:opacity .5s var(--ease),filter .5s var(--ease);}
.recap.leaving{opacity:.25;filter:blur(3px);}
.eb{font-family:var(--mono);font-size:9.5px;letter-spacing:.24em;color:var(--sig);text-transform:uppercase;display:inline-flex;align-items:center;gap:7px;}
.eb::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--sig);box-shadow:0 0 7px var(--sig);}
.rh{font-family:var(--head);font-size:30px;line-height:.9;letter-spacing:.01em;margin-top:6px;}
.hero2{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-top:16px;}
.bc{border-radius:14px;padding:12px 6px 10px;text-align:center;}
.bc.now{border:1px solid var(--hair);background:var(--panel);}
.bc.tgt{border:1px solid color-mix(in srgb,var(--sig) 32%,transparent);background:color-mix(in srgb,var(--sig) 6%,transparent);}
.bc .bl{font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;}
.bc.tgt .bl{color:var(--sig);}
.bc img{height:158px;width:auto;display:block;margin:6px auto 8px;object-fit:contain;}
.bc.now img{opacity:.78;filter:grayscale(.25);}
.bc.tgt img{filter:drop-shadow(0 0 15px rgba(200,255,0,.38));}
.bc .bv{font-family:var(--head);font-size:24px;line-height:.85;}
.bc.now .bv{color:var(--white);}.bc.tgt .bv{color:var(--sig);}
.bc .bk{font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-top:4px;}
.midway{display:flex;flex-direction:column;align-items:center;gap:4px;}
.midway .ln{width:1px;height:30px;background:linear-gradient(var(--hair),var(--sig));}
.midway .wk{font-family:var(--head);font-size:15px;color:var(--sig);line-height:.8;}
.midway .wkl{font-family:var(--mono);font-size:6.5px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;}
.midway svg{width:16px;height:16px;stroke:var(--sig);fill:none;stroke-width:1.6;}
.sl{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin:26px 0 14px;}
.path{position:relative;padding-left:26px;}
.path::before{content:"";position:absolute;left:7px;top:6px;bottom:12px;width:1px;background:linear-gradient(var(--sig),var(--hair));}
.step{position:relative;padding:11px 0;}
.step::before{content:"";position:absolute;left:-23px;top:15px;width:9px;height:9px;border-radius:50%;background:#0C0F15;border:1.5px solid var(--dim);}
.step.on::before{background:var(--sig);border-color:var(--sig);box-shadow:0 0 8px var(--sig);}
.step .sw{font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;}
.step .st{font-family:var(--head);font-size:17px;letter-spacing:.02em;margin-top:1px;}
.step .sd{font-family:var(--body);font-weight:300;font-size:11.5px;color:var(--mid);margin-top:2px;line-height:1.4;}
.step .sdelta{display:inline-block;font-family:var(--mono);font-size:8.5px;color:var(--sig);margin-top:5px;letter-spacing:.04em;border:1px solid color-mix(in srgb,var(--sig) 26%,transparent);border-radius:6px;padding:2px 7px;}
.exp{display:flex;gap:8px;}
.et{flex:1;border-radius:13px;border:1px solid var(--hair);background:var(--panel);padding:14px 8px;text-align:center;}
.et svg{width:20px;height:20px;stroke:var(--sig);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.et .ev{font-family:var(--head);font-size:24px;color:var(--sig);line-height:.85;margin-top:9px;}
.et .ek{font-family:var(--mono);font-size:7px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;margin-top:5px;}
.expnote{font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;text-align:center;margin-top:12px;}
.rcta{display:block;width:100%;margin-top:26px;height:50px;border:none;border-radius:25px;background:var(--sig);color:#0A0D12;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;}

/* ===== BEAT 2 · FORGE / CALIBRATION (full-screen fixed overlay) ===== */
.forge{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:none;background:#000;z-index:50;overflow:hidden;}
.forge.show{display:block;}
.bgv{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85;}
.fscrim{position:absolute;inset:0;background:radial-gradient(120% 80% at 50% 46%,transparent,rgba(10,13,18,.55) 66%,rgba(10,13,18,.92));}
.sparks{position:absolute;inset:0;z-index:6;pointer-events:none;}
.calib{position:absolute;inset:0;padding:0 30px;display:flex;flex-direction:column;justify-content:center;z-index:5;opacity:0;transition:opacity .6s var(--ease);}
.forge.lit .calib{opacity:1;}
.chead{position:absolute;top:12%;left:30px;right:30px;text-align:center;}
.chead .k{font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--sig);text-transform:uppercase;}
.chead .st{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-top:12px;height:13px;transition:opacity .3s;}
.pbar{width:150px;height:2px;border-radius:2px;background:rgba(255,255,255,.1);margin:16px auto 0;overflow:hidden;}
.pbar .pf{height:100%;width:0;background:var(--sig);box-shadow:0 0 8px var(--sig);}
.crow{display:flex;align-items:baseline;justify-content:space-between;padding:15px 0;border-bottom:1px solid rgba(255,255,255,.06);opacity:0;transform:translateY(8px);}
.crow.in{opacity:1;transform:none;transition:opacity .45s var(--ease),transform .45s var(--ease);}
.crow .cl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;}
.crow .cright{display:flex;align-items:center;gap:10px;}
.crow .cv{font-family:var(--head);font-size:22px;letter-spacing:.02em;color:var(--mid);min-width:20px;text-align:right;}
.crow .cv.locked{color:var(--white);}
.crow .cdot{width:7px;height:7px;border-radius:50%;background:var(--dim);transition:background .3s,box-shadow .3s;}
.crow .cv.locked + .cdot{background:var(--sig);box-shadow:0 0 8px var(--sig);}

/* transition flash */
.flash{position:fixed;inset:0;background:#000;z-index:90;opacity:0;pointer-events:none;transition:opacity .45s var(--ease);}
.flash.on{opacity:1;}
@media(prefers-reduced-motion:reduce){.bgv{opacity:.6}}
</style>
</head>
<body>
<div class="wrap">

  <!-- BEAT 1 · RECAP -->
  <section class="recap" id="recap">
    <div class="eb">Assigned by ZEAL</div>
    <div class="rh">YOUR NEXT 12 WEEKS</div>
    <div class="hero2">
      <div class="bc now"><span class="bl">Start · today</span><img src="brand-assets/body-model/grid-clean/obeyos-model-male-f2m1.webp" alt=""><div class="bv">22%</div><div class="bk">body fat</div></div>
      <div class="midway"><div class="ln"></div><div class="wk">12</div><div class="wkl">weeks</div><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      <div class="bc tgt"><span class="bl">Finish · wk 12</span><img src="brand-assets/body-model/grid-clean/obeyos-model-male-f1m2.webp" alt=""><div class="bv">18%</div><div class="bk">body fat</div></div>
    </div>
    <div class="sl">The path</div>
    <div class="path" id="path"></div>
    <div class="sl">What to expect · by week 12</div>
    <div class="exp" id="exp"></div>
    <div class="expnote">Projected on your tier + adherence · re-checked each phase</div>
    <button class="rcta" id="buildBtn">Build my program →</button>
  </section>

  <!-- BEAT 2 · FORGE / CALIBRATION -->
  <section class="forge" id="forge">
    <video class="bgv" id="bgv" muted playsinline loop preload="auto">
      <source src="brand-assets/video-loops/vid-intro-forge-signal-01.mp4" type="video/mp4">
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_2xwxbqXTnKKshPKSiHrPHfWFU2z/hf_20260722_120131_09ba20e3-5a55-4b75-a897-4fcbb0c4f20c.mp4" type="video/mp4">
    </video>
    <div class="fscrim"></div>
    <canvas class="sparks" id="sparks"></canvas>
    <div class="calib" id="calib">
      <div class="chead"><div class="k">ZEAL · Calibrating</div><div class="st" id="cst">Waking the engine</div><div class="pbar"><div class="pf" id="pf"></div></div></div>
      <div class="rows" id="rows"></div>
    </div>
  </section>

  <div class="flash" id="flash"></div>
</div>

<script>
(function(){
  var rm=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var IC={fat:'<path d="M12 3c4 5 6 8 6 11a6 6 0 01-12 0c0-3 2-6 6-11z"/><path d="M9 15l6-4"/>',lean:'<path d="M4 16h16M7 11h10M10 6h4"/>',str:'<path d="M4 18l6-9 4 5 6-9"/>'};

  /* ---- RECAP · path + tiles ---- */
  var STEPS=[
    ['WK 0','Where you are','22% body fat · Tier 2 · left knee flagged','','on'],
    ['WK 1–4','Foundation','Groove the patterns, build work capacity.','−1.5% fat','on'],
    ['WK 5–8','Build','Add load and volume — drive the muscle.','−1.5% · +1kg lean',''],
    ['WK 9–12','Peak','Intensify, express strength, then deload.','−1% · +1kg lean',''],
    ['WK 12','Where it takes you','18% body fat · +2kg lean · stronger.','','']
  ];
  document.getElementById('path').innerHTML=STEPS.map(function(s){
    return '<div class="step'+(s[4]?' on':'')+'"><div class="sw">'+s[0]+'</div><div class="st">'+s[1]+'</div><div class="sd">'+s[2]+'</div>'+(s[3]?'<span class="sdelta">'+s[3]+'</span>':'')+'</div>';
  }).join('');
  var EXP=[['fat','−4%','Body fat'],['lean','+2kg','Lean mass'],['str','+12%','Est. strength']];
  document.getElementById('exp').innerHTML=EXP.map(function(e){
    return '<div class="et"><svg viewBox="0 0 24 24">'+IC[e[0]]+'</svg><div class="ev">'+e[1]+'</div><div class="ek">'+e[2]+'</div></div>';
  }).join('');

  /* ---- CALIBRATION rows ---- */
  var ROWS=[
    ['Reading body composition','Body fat','22%'],
    ['Estimating skeletal muscle','Muscle mass','42%'],
    ['Pulling overnight recovery','HRV · sleep','68 · 8.1h'],
    ['Mapping your injury history','Left knee','Flagged'],
    ['Matching the program library','Programs','31 → 1'],
    ['Locking your training tier','Tier','2']
  ];
  var STEP=1500,HOLD=750,START=600,TOTAL=START+ROWS.length*STEP+400;
  var rowsEl=document.getElementById('rows');
  rowsEl.innerHTML=ROWS.map(function(r,i){return '<div class="crow" id="cr'+i+'"><span class="cl">'+r[1]+'</span><span class="cright"><span class="cv" id="cv'+i+'"></span><span class="cdot"></span></span></div>';}).join('');
  var CH='0123456789%·HMSFLAGEDKNRThkm',timers=[];
  function T(fn,ms){var id=setTimeout(fn,ms);timers.push(id);return id;}
  function scramble(el,val,dur){
    var iv=setInterval(function(){var s='';for(var i=0;i<val.length;i++){s+=val[i]===' '?' ':CH[Math.floor(Math.random()*CH.length)];}el.textContent=s;},55);
    timers.push(iv);
    T(function(){clearInterval(iv);el.textContent=val;el.classList.add('locked');},dur);
  }

  /* ---- CONVERGENCE SPARKS (system coming online) ---- */
  var cv=document.getElementById('sparks'),cx2=cv.getContext('2d'),raf=null;
  function sizeSparks(){var d=window.devicePixelRatio||1,r=cv.getBoundingClientRect();cv.width=r.width*d;cv.height=r.height*d;cx2.setTransform(d,0,0,d,0,0);return r;}
  function convergeSparks(done){
    var r=sizeSparks(),W=r.width,H=r.height,cx=W/2,cy=H*0.5;
    var P=[],N=54;
    for(var i=0;i<N;i++){
      var ang=Math.random()*Math.PI*2,rad=Math.max(W,H)*(0.5+Math.random()*0.35);
      P.push({x:cx+Math.cos(ang)*rad,y:cy+Math.sin(ang)*rad,tx:cx+(Math.random()-.5)*40,ty:cy+(Math.random()-.5)*40,life:0,dur:0.62+Math.random()*0.3,sz:1+Math.random()*2});
    }
    var start=null,DUR=950;
    function frame(ts){
      if(!start)start=ts;var t=(ts-start)/DUR;
      cx2.clearRect(0,0,W,H);
      var alive=false;
      P.forEach(function(p){
        var lt=Math.min(1,t/p.dur);if(lt<1)alive=true;
        var e=1-Math.pow(1-lt,2.4);
        var x=p.x+(p.tx-p.x)*e,y=p.y+(p.ty-p.y)*e;
        var a=lt<.85?(0.15+0.8*lt):(1-(lt-.85)/.15);
        cx2.beginPath();cx2.arc(x,y,p.sz*(1-lt*0.4),0,Math.PI*2);
        cx2.fillStyle='rgba(200,255,0,'+Math.max(0,a)+')';
        cx2.shadowColor='#C8FF00';cx2.shadowBlur=8;cx2.fill();
      });
      cx2.shadowBlur=0;
      // central ignition flash near the end
      if(t>0.72){var f=(t-0.72)/0.28,fa=Math.sin(Math.min(1,f)*Math.PI)*0.5;var g=cx2.createRadialGradient(cx,cy,0,cx,cy,120);g.addColorStop(0,'rgba(200,255,0,'+fa+')');g.addColorStop(1,'rgba(200,255,0,0)');cx2.fillStyle=g;cx2.fillRect(cx-120,cy-120,240,240);}
      if(t<1&&alive){raf=requestAnimationFrame(frame);}else{cx2.clearRect(0,0,W,H);done&&done();}
    }
    raf=requestAnimationFrame(frame);
  }

  /* ---- CALIBRATION run ---- */
  function runCalibration(){
    var pf=document.getElementById('pf'),st=document.getElementById('cst');
    st.textContent='Waking the engine';pf.style.transition='none';pf.style.width='0';
    T(function(){pf.style.transition='width '+(TOTAL/1000)+'s linear';pf.style.width='100%';},80);
    ROWS.forEach(function(r,i){
      T(function(){st.textContent=r[0];document.getElementById('cr'+i).classList.add('in');scramble(document.getElementById('cv'+i),r[2],HOLD);},START+i*STEP);
    });
    T(function(){st.textContent='Locked';},START+ROWS.length*STEP);
    // end → fade to black → the program page (separate, rich)
    T(function(){ toProgram(); },TOTAL+650);
  }

  var recap=document.getElementById('recap'),forge=document.getElementById('forge'),vid=document.getElementById('bgv'),flash=document.getElementById('flash');
  function toProgram(){ flash.classList.add('on'); setTimeout(function(){ location.href='program.html'; },460); }

  function runForge(){
    // recap fades back, screen goes to black (cinematic)
    recap.classList.add('leaving');
    flash.classList.add('on');
    setTimeout(function(){
      forge.classList.add('show');
      try{vid.currentTime=0;var pr=vid.play();if(pr&&pr.catch)pr.catch(function(){});}catch(e){}
      flash.classList.remove('on');            // reveal black forge + sparks
      if(rm){ forge.classList.add('lit'); ROWS.forEach(function(r,i){document.getElementById('cr'+i).classList.add('in');var c=document.getElementById('cv'+i);c.textContent=r[2];c.classList.add('locked');}); setTimeout(toProgram,1400); return; }
      // sparks converge → the engine lights → calibration boots
      convergeSparks(function(){ forge.classList.add('lit'); runCalibration(); });
    },470);
  }

  document.getElementById('buildBtn').addEventListener('click',runForge);
})();
</script>
</body>
</html>
